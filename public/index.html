<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameFlash — Top Up Game Murah & Cepat</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8fc;--surface:#fff;--surface2:#f2f2f8;--border:#e4e4ee;
  --text:#0d0d1a;--text2:#4a4a6a;--text3:#9090b0;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:#f0eeff;
  --green:#00c47a;--red:#ff4757;--orange:#ff6b35;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 20px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.nav-actions{display:flex;gap:8px}
.btn-sm{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid var(--border);background:transparent;color:var(--text2);transition:.15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm.primary:hover{background:#5a4dd6}

/* HERO */
.hero{background:linear-gradient(135deg,#0d0d1a 0%,#1a1230 60%,#0d0d1a 100%);color:#fff;padding:56px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(108,92,231,.3) 0%,transparent 70%)}
.hero-inner{max-width:600px;margin:0 auto;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;margin-bottom:18px;letter-spacing:.5px}
.hero h1{font-size:clamp(28px,6vw,44px);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:12px}
.hero h1 span{color:var(--accent2)}
.hero p{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:28px;line-height:1.6}
.hero-search{display:flex;gap:8px;max-width:400px;margin:0 auto}
.hero-search input{flex:1;padding:12px 16px;border-radius:10px;border:none;font-family:inherit;font-size:14px;outline:none}
.hero-search button{padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.hero-trust{display:flex;gap:20px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.5)}

/* CATEGORIES */
.section{padding:32px 20px}
.section-inner{max-width:1100px;margin:0 auto}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:.15s;white-space:nowrap}
.cat-tab.active,.cat-tab:hover{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}

/* GAME GRID */
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:16px}
@media(max-width:480px){.game-grid{grid-template-columns:repeat(3,1fr)}}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;text-decoration:none;color:var(--text);display:block}
.game-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(108,92,231,.15);transform:translateY(-2px)}
.game-thumb{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.game-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.game-info{padding:10px}
.game-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-cat{font-size:11px;color:var(--text3);margin-top:2px}

/* CEK ORDER */
.cek-order{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:8px}
.cek-order-inner{display:flex;gap:8px}
.cek-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none;color:var(--text);background:var(--bg)}
.cek-input:focus{border-color:var(--accent)}
.cek-btn{padding:11px 20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit}
.cek-result{margin-top:12px;font-size:13px}

/* STATUS BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge.green{background:rgba(0,196,122,.1);color:var(--green)}
.badge.red{background:rgba(255,71,87,.1);color:var(--red)}
.badge.amber{background:rgba(255,152,0,.1);color:#ff9800}
.badge.blue{background:rgba(108,92,231,.1);color:var(--accent)}

/* LOADING */
.shimmer{background:linear-gradient(90deg,var(--surface2) 25%,#e8e8f0 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d0d1a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:24px 20px;text-align:center;font-size:12px;color:var(--text3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px;animation:slideUp .25s ease}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}.modal{border-radius:20px;max-height:90vh}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}

@media(max-width:600px){
  .hero{padding:40px 16px}
  .section{padding:24px 16px}
  nav{padding:0 16px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">⚡</div>
      Game<span>Flash</span>
    </a>
    <div class="nav-actions">
      <button class="btn-sm" onclick="openCekOrder()">Cek Order</button>
      <button class="btn-sm primary" id="nav-user-btn" onclick="handleNavUser()">Masuk</button>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">⚡ TRUSTED & FAST</div>
    <h1>Top Up Game<br><span>Anti Ribet!</span></h1>
    <p>Murah, cepat & 100% aman.<br>Ribuan produk siap top up.</p>
    <div class="hero-search">
      <input type="text" placeholder="Cari game atau produk..." id="hero-search" oninput="filterGames()">
      <button onclick="filterGames()">Cari</button>
    </div>
    <div class="hero-trust">
      <div class="trust-item">⚡ Proses Instan</div>
      <div class="trust-item">🔒 100% Aman</div>
      <div class="trust-item">💳 Banyak Metode</div>
      <div class="trust-item">🎧 CS Online</div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-inner">
    <div class="section-title">🎮 Semua Produk</div>
    <div class="cat-tabs" id="cat-tabs">
      <div class="cat-tab active" data-cat="" onclick="filterCat(this,'')">Semua</div>
    </div>
    <div class="game-grid" id="game-grid">
      <div class="shimmer" style="height:180px"></div>
      <div class="shimmer" style="height:180px"></div>
      <div class="shimmer" style="height:180px"></div>
      <div class="shimmer" style="height:180px"></div>
      <div class="shimmer" style="height:180px"></div>
      <div class="shimmer" style="height:180px"></div>
    </div>
  </div>
</div>

<!-- Cek Order Modal -->
<div class="modal-overlay" id="modal-cek" onclick="if(event.target===this)closeModal('modal-cek')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🔍 Cek Status Pesanan</div>
    <div class="cek-order-inner">
      <input class="cek-input" type="text" id="cek-input" placeholder="Masukkan Order ID..." style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
      <button class="cek-btn" onclick="cekOrder()">Cek</button>
    </div>
    <div class="cek-result" id="cek-result"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<footer>
  <div id="footer-text">© 2025 GameFlash. Semua hak dilindungi.</div>
</footer>

<script>
const fmt = n => 'Rp ' + Math.round(n||0).toLocaleString('id-ID');
let ALL_GAMES = [], currentCat = '', searchQ = '';

async function loadGames() {
  try {
    const r = await fetch('/api/games');
    const d = await r.json();
    if (!d.success) return;
    ALL_GAMES = d.games || [];
    buildCatTabs();
    renderGames();
    loadSiteSettings();
  } catch(e) { console.error(e); }
}

function buildCatTabs() {
  const cats = [...new Set(ALL_GAMES.map(g => g.category).filter(Boolean))];
  const catLabels = { game:'🎮 Game', pulsa:'📱 Pulsa', ewallet:'💳 E-Wallet', voucher:'🎟️ Voucher', streaming:'📺 Streaming', lainnya:'📦 Lainnya' };
  const tabs = document.getElementById('cat-tabs');
  const existing = tabs.querySelector('.cat-tab');
  cats.forEach(c => {
    const t = document.createElement('div');
    t.className = 'cat-tab';
    t.dataset.cat = c;
    t.textContent = catLabels[c] || c;
    t.onclick = () => filterCat(t, c);
    tabs.appendChild(t);
  });
}

function filterCat(el, cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGames();
}

function filterGames() {
  searchQ = document.getElementById('hero-search').value.toLowerCase();
  renderGames();
}

function renderGames() {
  let games = ALL_GAMES.filter(g => {
    if (currentCat && g.category !== currentCat) return false;
    if (searchQ && !g.name.toLowerCase().includes(searchQ) && !(g.code||'').toLowerCase().includes(searchQ)) return false;
    return true;
  });
  const grid = document.getElementById('game-grid');
  if (!games.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">Tidak ada produk ditemukan</div>';
    return;
  }
  grid.innerHTML = games.map(g => `
    <a href="/order?game=${g.code}" class="game-card">
      <div class="game-thumb">
        ${g.icon_url ? `<img src="${g.icon_url}" onerror="this.remove()">` : ''}
        <span style="font-size:32px">${g.icon||'🎮'}</span>
      </div>
      <div class="game-info">
        <div class="game-name">${g.name}</div>
        <div class="game-cat">${g.category||''}</div>
      </div>
    </a>`).join('');
}

async function loadSiteSettings() {
  try {
    const r = await fetch('/api/settings');
    const d = await r.json();
    if (d.success) {
      if (d.settings.site_name) document.title = d.settings.site_name + ' — Top Up Game';
      if (d.settings.footer_text) document.getElementById('footer-text').textContent = d.settings.footer_text;
    }
  } catch(_) {}
}

function openCekOrder() {
  document.getElementById('modal-cek').classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

async function cekOrder() {
  const id = document.getElementById('cek-input').value.trim().toUpperCase();
  const res = document.getElementById('cek-result');
  if (!id) { res.innerHTML = '<span style="color:var(--red)">Masukkan Order ID</span>'; return; }
  res.innerHTML = '<span style="color:var(--text3)">Mencari...</span>';
  try {
    const r = await fetch('/api/orders/' + id);
    const d = await r.json();
    if (!d.success) { res.innerHTML = '<span style="color:var(--red)">Order tidak ditemukan</span>'; return; }
    const o = d.order;
    const payBadge = {paid:'green',unpaid:'amber',expired:'red',failed:'red'};
    const topBadge = {success:'green',processing:'blue',pending:'amber',failed:'red'};
    res.innerHTML = `
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:4px">
        <div style="font-family:monospace;font-size:13px;font-weight:700;margin-bottom:8px">${o.order_id}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px">${o.game_name||''} — ${o.package_name||''}</div>
        <div style="font-size:13px;margin-bottom:8px">${fmt(o.total_amount)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="badge ${payBadge[o.payment_status]||'amber'}">Bayar: ${o.payment_status}</span>
          <span class="badge ${topBadge[o.topup_status]||'amber'}">Top Up: ${o.topup_status}</span>
        </div>
        ${o.sn ? `<div style="margin-top:8px;font-size:12px;color:var(--text3)">SN: ${o.sn}</div>` : ''}
      </div>`;
  } catch(e) { res.innerHTML = '<span style="color:var(--red)">Gagal memuat data</span>'; }
}

function handleNavUser() {
  const t = localStorage.getItem('gf_token');
  if (t) { window.location.href = '/admin'; } else { window.location.href = '/login'; }
}

// Check if admin logged in
const tok = localStorage.getItem('gf_token');
if (tok) document.getElementById('nav-user-btn').textContent = 'Admin';

loadGames();
</script>
</body>
</html>
