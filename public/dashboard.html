<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — GameFlash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#16161f;--surface2:#1c1c28;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--text2:#9090a8;
  --accent:#6c47ff;--accent-glow:rgba(108,71,255,0.3);
  --orange:#ff6a00;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,13,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;}
.topbar-back{width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s;}
.topbar-back:hover{background:var(--surface2);}
.topbar-title{font-size:17px;font-weight:700;flex:1;}
.topbar-logout{background:none;border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.topbar-logout:hover{background:rgba(239,68,68,0.1);}

/* Sections */
.content{padding:16px;display:flex;flex-direction:column;gap:16px;max-width:480px;margin:0 auto;}

/* Profile Card */
.profile-card{background:linear-gradient(135deg,#1a1035 0%,#16161f 100%);border:1px solid rgba(108,71,255,0.2);border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.profile-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(108,71,255,0.25) 0%,transparent 70%);pointer-events:none;}
.profile-avatar{width:64px;height:64px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;box-shadow:0 0 24px var(--accent-glow);margin-bottom:12px;}
.profile-name{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.profile-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(108,71,255,0.15);border:1px solid rgba(108,71,255,0.3);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--accent);margin-top:6px;}
.profile-info{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.profile-info-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2);}
.profile-info-row svg{flex-shrink:0;}
.profile-info-row span{color:var(--text);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:800;}
.stat-val.green{color:var(--green);}
.stat-val.yellow{color:var(--yellow);}
.stat-val.red{color:var(--red);}
.stat-val.blue{color:#60a5fa;}

/* Section header */
.sec-header{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sec-header span{color:var(--text2);font-size:13px;font-weight:400;}

/* Quick links */
.quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.quick-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;text-decoration:none;color:var(--text);transition:border-color .2s,background .2s;cursor:pointer;display:block;}
.quick-btn:hover{border-color:var(--accent);background:rgba(108,71,255,0.06);}
.quick-btn .icon{font-size:22px;margin-bottom:6px;}
.quick-btn .label{font-size:12px;color:var(--text2);}

/* Order list */
.order-list{display:flex;flex-direction:column;gap:10px;}
.order-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.order-game{font-size:14px;font-weight:600;}
.order-pkg{font-size:12px;color:var(--text2);margin-top:2px;}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.badge.success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.badge.pending{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2);}
.badge.failed{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.badge.process{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.2);}
.order-bottom{display:flex;justify-content:space-between;align-items:center;}
.order-price{font-size:15px;font-weight:700;color:var(--accent);}
.order-date{font-size:11px;color:var(--text2);}
.order-id{font-size:11px;color:var(--text2);margin-top:4px;}

.empty-state{text-align:center;padding:32px 16px;color:var(--text2);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}
.empty-state p{font-size:14px;}

.loading-shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;height:80px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.change-pass-btn{width:100%;padding:13px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.change-pass-btn:hover{border-color:var(--accent);color:var(--text);background:rgba(108,71,255,0.05);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#1c1c28;border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.modal label{font-size:12px;color:var(--text2);}
.modal .input-wrap{position:relative;}
.modal .input-wrap input{width:100%;height:44px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:0 42px 0 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s;}
.modal .input-wrap input:focus{border-color:var(--accent);}
.modal .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;}
.modal-msg{font-size:13px;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none;}
.modal-msg.error{background:rgba(239,68,68,.1);color:#f08080;border:1px solid rgba(239,68,68,.2);}
.modal-msg.success{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.modal-actions{display:flex;gap:8px;margin-top:4px;}
.btn-cancel{flex:1;height:42px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save{flex:1;height:42px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <button class="topbar-back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">Dashboard Saya</div>
  <button class="topbar-logout" onclick="doLogout()">Keluar</button>
</div>

<div class="content">

  <!-- Profile Card -->
  <div class="profile-card">
    <div class="profile-avatar" id="d-avatar">?</div>
    <div class="profile-name" id="d-name">—</div>
    <div class="profile-badge">⚡ Member</div>
    <div class="profile-info">
      <div class="profile-info-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span id="d-email">—</span>
      </div>
      <div class="profile-info-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63 19.79 19.79 0 01.03 2.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
        <span id="d-phone">—</span>
      </div>
    </div>
  </div>

  <!-- Quick Links -->
  <div>
    <div class="sec-header" style="margin-bottom:10px;">Menu</div>
    <div class="quick-grid">
      <a href="/" class="quick-btn">
        <div class="icon">⚡</div>
        <div class="label">Top Up</div>
      </a>
      <a href="/cek-order" class="quick-btn">
        <div class="icon">🔍</div>
        <div class="label">Cek Order</div>
      </a>
      <button class="quick-btn" onclick="openChangePw()">
        <div class="icon">🔒</div>
        <div class="label">Ubah Password</div>
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div>
    <div class="sec-header" style="margin-bottom:10px;">Statistik Order</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Order</div>
        <div class="stat-val blue" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Berhasil</div>
        <div class="stat-val green" id="stat-success">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Menunggu</div>
        <div class="stat-val yellow" id="stat-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gagal</div>
        <div class="stat-val red" id="stat-failed">—</div>
      </div>
    </div>
  </div>

  <!-- Recent Orders -->
  <div>
    <div class="sec-header" style="margin-bottom:10px;">
      Riwayat Order Terbaru
      <span id="order-total-count"></span>
    </div>
    <div class="order-list" id="order-list">
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer"></div>
    </div>
  </div>

</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>🔒 Ubah Password</h3>
    <div class="modal-msg" id="pw-msg"></div>
    <div class="field">
      <label>Password Lama</label>
      <div class="input-wrap">
        <input type="password" id="pw-old" placeholder="••••••••">
        <button class="eye" type="button" onclick="togglePw('pw-old',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Password Baru</label>
      <div class="input-wrap">
        <input type="password" id="pw-new" placeholder="Min. 8 karakter + angka">
        <button class="eye" type="button" onclick="togglePw('pw-new',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="field">
      <label>Konfirmasi Password Baru</label>
      <div class="input-wrap">
        <input type="password" id="pw-new2" placeholder="Ulangi password baru">
        <button class="eye" type="button" onclick="togglePw('pw-new2',this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeChangePw()">Batal</button>
      <button class="btn-save" id="pw-save-btn" onclick="doChangePw()">Simpan</button>
    </div>
  </div>
</div>

<script>
// Auth check
const token = localStorage.getItem('gf_user_token');
const userRaw = localStorage.getItem('gf_user');
if (!token || !userRaw) { window.location.href = '/user-auth'; }

const user = JSON.parse(userRaw || '{}');

// Render profile
document.getElementById('d-avatar').textContent = (user.name || 'U')[0].toUpperCase();
document.getElementById('d-name').textContent = user.name || '—';
document.getElementById('d-email').textContent = user.email || '—';
document.getElementById('d-phone').textContent = user.phone || 'Belum diisi';

// Fetch orders
async function loadOrders() {
  try {
    const res = await fetch('/api/users/orders?limit=20', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    if (!data.success) throw new Error();

    const orders = data.orders || [];
    const total = data.total || 0;

    // Stats
    const success = orders.filter(o => o.topup_status === 'success').length;
    const pending = orders.filter(o => ['pending','waiting'].includes(o.payment_status)).length;
    const failed  = orders.filter(o => o.topup_status === 'failed' || o.payment_status === 'failed').length;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-success').textContent = success;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-failed').textContent  = failed;
    document.getElementById('order-total-count').textContent = total ? `(${total})` : '';

    const list = document.getElementById('order-list');
    if (!orders.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Belum ada order.<br>Yuk top up sekarang!</p></div>`;
      return;
    }

    list.innerHTML = orders.slice(0, 10).map(o => {
      const statusLabel = {
        success: 'Berhasil', failed: 'Gagal', pending: 'Menunggu',
        waiting: 'Menunggu', process: 'Diproses', paid: 'Dibayar'
      };
      const statusClass = {
        success: 'success', failed: 'failed', pending: 'pending',
        waiting: 'pending', process: 'process', paid: 'process'
      };
      const st = o.topup_status || o.payment_status || 'pending';
      const label = statusLabel[st] || st;
      const cls   = statusClass[st] || 'pending';
      const date  = new Date(o.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const price = 'Rp ' + Number(o.total_amount).toLocaleString('id-ID');
      return `
        <div class="order-item">
          <div class="order-top">
            <div>
              <div class="order-game">${o.game_name || '—'}</div>
              <div class="order-pkg">${o.package_name || '—'}</div>
            </div>
            <div class="badge ${cls}">${label}</div>
          </div>
          <div class="order-bottom">
            <div class="order-price">${price}</div>
            <div class="order-date">${date}</div>
          </div>
          <div class="order-id">#${o.order_id}</div>
        </div>`;
    }).join('');
  } catch {
    document.getElementById('order-list').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat riwayat order.</p></div>`;
  }
}

loadOrders();

// Logout
function doLogout() {
  localStorage.removeItem('gf_user_token');
  localStorage.removeItem('gf_user');
  window.location.href = '/';
}

// Change password modal
const EYE_OPEN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_CLOSED = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
}

function openChangePw() {
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-new2').value = '';
  const msg = document.getElementById('pw-msg');
  msg.style.display = 'none';
  document.getElementById('pw-modal').classList.add('show');
}
function closeChangePw() {
  document.getElementById('pw-modal').classList.remove('show');
}

async function doChangePw() {
  const old_password = document.getElementById('pw-old').value;
  const new_password = document.getElementById('pw-new').value;
  const new_password2 = document.getElementById('pw-new2').value;
  const msg = document.getElementById('pw-msg');
  const btn = document.getElementById('pw-save-btn');
  msg.style.display = 'none';

  if (!old_password || !new_password || !new_password2) {
    msg.textContent = 'Semua field wajib diisi'; msg.className = 'modal-msg error'; msg.style.display = 'block'; return;
  }
  if (new_password !== new_password2) {
    msg.textContent = 'Konfirmasi password tidak cocok'; msg.className = 'modal-msg error'; msg.style.display = 'block'; return;
  }
  if (new_password.length < 8 || !/[A-Za-z]/.test(new_password) || !/\d/.test(new_password)) {
    msg.textContent = 'Password baru minimal 8 karakter, harus ada huruf dan angka'; msg.className = 'modal-msg error'; msg.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Menyimpan…';
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ old_password, new_password })
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = 'Password berhasil diubah!'; msg.className = 'modal-msg success'; msg.style.display = 'block';
      setTimeout(closeChangePw, 1500);
    } else {
      msg.textContent = data.message || 'Gagal mengubah password'; msg.className = 'modal-msg error'; msg.style.display = 'block';
    }
  } catch {
    msg.textContent = 'Gagal terhubung ke server'; msg.className = 'modal-msg error'; msg.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Simpan';
}

// Close modal on overlay click
document.getElementById('pw-modal').addEventListener('click', function(e) {
  if (e.target === this) closeChangePw();
});
</script>
</body>
</html>
