<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — GameFlash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#16161f;--border:rgba(255,255,255,0.08);
  --text:#f0f0f5;--text2:#9090a8;--accent:#6c47ff;
  --accent-glow:rgba(108,71,255,0.35);--success:#22c55e;--error:#f08080;--radius:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,71,255,0.18) 0%,transparent 70%);pointer-events:none;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:420px;position:relative;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--accent-glow);}
.logo-icon svg{width:22px;height:22px;fill:#fff}
.logo-name{font-size:20px;font-weight:700;letter-spacing:-0.4px}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px}
.field-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
label{font-size:12px;font-weight:500;color:var(--text2);}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-wrap input{padding-right:44px;}
.eye-btn{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.eye-btn:hover{color:var(--text);}
input{height:44px;background:rgba(255,255,255,0.05);border:0.5px solid var(--border);border-radius:10px;padding:0 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit;width:100%;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
input::placeholder{color:rgba(144,144,168,0.5);}
.btn{width:100%;height:46px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;margin-top:4px;}
.btn:hover:not(:disabled){opacity:.9;}
.btn:active:not(:disabled){transform:scale(.99);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg-box{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.msg-box.error{background:rgba(163,45,45,.15);border:0.5px solid rgba(163,45,45,.3);color:var(--error);}
.msg-box.success{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.3);color:var(--success);}
.hint{font-size:12px;color:var(--text2);margin-top:-10px;margin-bottom:4px;}
.back-link{display:block;text-align:center;font-size:13px;color:var(--text2);text-decoration:none;margin-top:20px;transition:color .15s;}
.back-link:hover{color:var(--text);}
h2{font-size:18px;font-weight:700;margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
    <div><div class="logo-name">GameFlash</div><div class="logo-sub">Top Up Game Instan</div></div>
  </div>

  <h2>Reset Password</h2>
  <p class="subtitle">Masukkan password baru kamu di bawah ini.</p>

  <div id="msg-err" class="msg-box error"></div>
  <div id="msg-ok" class="msg-box success"></div>

  <div id="form-reset">
    <div class="field-group">
      <label for="new-pass">Password Baru</label>
      <div class="input-wrap">
        <input type="password" id="new-pass" placeholder="Min. 8 karakter + angka" autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePass('new-pass',this)" tabindex="-1" aria-label="Tampilkan password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <span class="hint">Minimal 8 karakter, harus mengandung huruf dan angka.</span>
    </div>
    <div class="field-group">
      <label for="new-pass2">Konfirmasi Password Baru</label>
      <div class="input-wrap">
        <input type="password" id="new-pass2" placeholder="Ulangi password baru" autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePass('new-pass2',this)" tabindex="-1" aria-label="Tampilkan password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn-reset" onclick="doReset()">
      <span id="btn-reset-text">Simpan Password Baru</span>
      <div class="spinner" id="spin-reset"></div>
    </button>
  </div>

  <div id="form-done" style="display:none;text-align:center;padding:10px 0;">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px;"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
    <p style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;">Password berhasil diubah!</p>
    <p style="font-size:13px;color:var(--text2);margin-bottom:20px;">Silakan login dengan password baru kamu.</p>
    <a href="/user-auth" class="btn" style="text-decoration:none;">Masuk Sekarang</a>
  </div>

  <a href="/" class="back-link">← Kembali ke Toko</a>
</div>

<script>
const EYE_OPEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_CLOSED = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? EYE_CLOSED : EYE_OPEN;
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'msg-box '+type; el.style.display = 'block';
}

function setLoading(on) {
  document.getElementById('btn-reset').disabled = on;
  document.getElementById('btn-reset-text').style.display = on ? 'none' : '';
  document.getElementById('spin-reset').style.display = on ? 'block' : 'none';
}

// Ambil token dari URL
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  showMsg('msg-err', 'Link reset tidak valid. Silakan minta ulang link reset password.', 'error');
  document.getElementById('form-reset').style.display = 'none';
}

document.getElementById('new-pass2').addEventListener('keydown', e => { if(e.key==='Enter') doReset(); });

async function doReset() {
  const password = document.getElementById('new-pass').value;
  const password2 = document.getElementById('new-pass2').value;
  document.getElementById('msg-err').style.display = 'none';

  if (!password) { showMsg('msg-err','Password baru wajib diisi','error'); return; }
  if (password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)) {
    showMsg('msg-err','Password minimal 8 karakter dan harus mengandung huruf serta angka','error'); return;
  }
  if (password !== password2) { showMsg('msg-err','Konfirmasi password tidak cocok','error'); return; }

  setLoading(true);
  try {
    const res = await fetch('/api/users/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token, password})
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('form-reset').style.display = 'none';
      document.getElementById('form-done').style.display = 'block';
    } else {
      showMsg('msg-err', data.message || 'Gagal mereset password. Coba minta link baru.', 'error');
    }
  } catch { showMsg('msg-err','Gagal terhubung ke server. Coba lagi.','error'); }
  setLoading(false);
}
</script>

<!-- Floating Hubungi CS Button -->
<style>
#cs-float-btn {
  position: fixed;
  bottom: 24px;
  right: 20px;
  z-index: 9999;
  display: none;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff;
  padding: 13px 18px;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: cs-pop-in 0.4s ease;
}
#cs-float-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 8px 28px rgba(37,211,102,0.55);
}
@keyframes cs-pop-in {
  from { opacity: 0; transform: translateY(20px) scale(0.85); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
<a id="cs-float-btn" href="#" target="_blank" rel="noopener noreferrer" title="Hubungi CS">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.535 5.845L.057 23.486a.5.5 0 0 0 .612.612l5.684-1.49A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.688-.528-5.207-1.442l-.376-.224-3.879 1.018 1.023-3.783-.238-.388A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
  </svg>
  <span>Hubungi CS</span>
</a>
<script>
fetch('/api/settings').then(r=>r.json()).then(d=>{
  if(d && d.success && d.settings && d.settings.contact_wa){
    const num = d.settings.contact_wa.replace(/\D/g,'');
    const btn = document.getElementById('cs-float-btn');
    btn.href = 'https://wa.me/' + num;
    btn.style.display = 'flex';
  }
}).catch(()=>{});
</script>

</body>
</html>
