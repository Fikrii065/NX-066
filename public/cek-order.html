<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Transaksi — GameFlash</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#141420;--surface2:#1c1c2a;--surface3:#242435;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f5;--text2:#a0a0b8;--text3:#606078;
  --accent:#ff6b1a;--accent-glow:rgba(255,107,26,0.3);--accent-dim:rgba(255,107,26,0.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.header{background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 14px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;}
.back-btn{width:38px;height:38px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;text-decoration:none;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.header-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;}

.wrap{padding:20px 14px;}

.search-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.search-box h2{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.search-box p{font-size:12px;color:var(--text2);margin-bottom:14px;}
.inp-row{display:flex;gap:8px;}
.field{height:46px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-xs);padding:0 14px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;width:100%;outline:none;transition:border-color .2s;}
.field:focus{border-color:var(--accent);}
.field::placeholder{color:var(--text3);}
.btn-cek{height:46px;padding:0 20px;background:var(--accent);border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:.3px;white-space:nowrap;transition:opacity .2s;flex-shrink:0;}
.btn-cek:hover:not(:disabled){opacity:.85;}
.btn-cek:disabled{opacity:.4;cursor:not-allowed;}

.result-box{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none;}
.result-header{padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.result-icon{font-size:24px;}
.result-game{font-size:13px;font-weight:600;}
.result-pkg{font-size:11px;color:var(--text2);margin-top:1px;}
.result-rows{padding:4px 0;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);}
.result-row:last-child{border-bottom:none;}
.rr-key{font-size:12px;color:var(--text2);}
.rr-val{font-size:13px;font-weight:500;text-align:right;max-width:60%;}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-success{background:var(--green-bg);color:var(--green);}
.badge-pending{background:var(--yellow-bg);color:var(--yellow);}
.badge-failed{background:var(--red-bg);color:var(--red);}

.pay-btn{display:block;width:100%;height:46px;background:linear-gradient(135deg,var(--accent),#ff4500);border:none;border-radius:var(--radius-xs);font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:.3px;margin:14px 16px;width:calc(100% - 32px);transition:opacity .2s;}
.pay-btn:hover{opacity:.9;}

.error-box{margin-top:16px;padding:14px 16px;background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);font-size:13px;color:var(--red);display:none;}
</style>
</head>
<body>

<header class="header">
  <a class="back-btn" href="/">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="header-title">Cek Transaksi</div>
</header>

<div class="wrap">
  <div class="search-box">
    <h2>Cek Status Order</h2>
    <p>Masukkan ID order untuk melihat status transaksi kamu.</p>
    <div class="inp-row">
      <input class="field" type="text" id="order-id-inp" placeholder="Contoh: ORD-XXXXXX" oninput="onInput()" onkeydown="if(event.key==='Enter')cekOrder()">
      <button class="btn-cek" id="cek-btn" onclick="cekOrder()" disabled>Cek</button>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="result-box" id="result-box">
    <div class="result-header">
      <div class="result-icon" id="r-icon">🎮</div>
      <div>
        <div class="result-game" id="r-game">—</div>
        <div class="result-pkg" id="r-pkg">—</div>
      </div>
    </div>
    <div class="result-rows">
      <div class="result-row"><span class="rr-key">Order ID</span><span class="rr-val" id="r-id">—</span></div>
      <div class="result-row"><span class="rr-key">Target Akun</span><span class="rr-val" id="r-account">—</span></div>
      <div class="result-row"><span class="rr-key">Total</span><span class="rr-val" id="r-total">—</span></div>
      <div class="result-row"><span class="rr-key">Metode Bayar</span><span class="rr-val" id="r-method">—</span></div>
      <div class="result-row"><span class="rr-key">Status Bayar</span><span class="rr-val" id="r-pay-status">—</span></div>
      <div class="result-row"><span class="rr-key">Status Top Up</span><span class="rr-val" id="r-topup-status">—</span></div>
      <div class="result-row" id="r-sn-row" style="display:none"><span class="rr-key">SN / Kode</span><span class="rr-val" id="r-sn" style="word-break:break-all;">—</span></div>
      <div class="result-row"><span class="rr-key">Tanggal Order</span><span class="rr-val" id="r-date">—</span></div>
    </div>
    <button class="pay-btn" id="pay-btn" style="display:none" onclick="goPayment()">💳 Lanjutkan Pembayaran</button>
  </div>
</div>

<script>
const fmt = n => 'Rp ' + (+n).toLocaleString('id-ID');
const fmtDate = d => d ? new Date(d).toLocaleString('id-ID',{dateStyle:'medium',timeStyle:'short'}) : '—';
let currentOrder = null;

function onInput(){
  const v = document.getElementById('order-id-inp').value.trim();
  document.getElementById('cek-btn').disabled = v.length < 3;
}

function badge(status, type){
  const map = {
    paid:     {cls:'badge-success', label:'Lunas ✓'},
    unpaid:   {cls:'badge-pending', label:'Belum Bayar'},
    expired:  {cls:'badge-failed',  label:'Kedaluwarsa'},
    success:  {cls:'badge-success', label:'Sukses ✓'},
    pending:  {cls:'badge-pending', label:'Diproses...'},
    failed:   {cls:'badge-failed',  label:'Gagal'},
    processing:{cls:'badge-pending',label:'Diproses...'},
  };
  const s = map[status] || {cls:'badge-pending', label: status||'—'};
  return `<span class="badge ${s.cls}">${s.label}</span>`;
}

async function cekOrder(){
  const id = document.getElementById('order-id-inp').value.trim();
  if(!id) return;
  const btn = document.getElementById('cek-btn');
  btn.disabled = true; btn.textContent = 'Mencari...';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';

  try {
    const r = await fetch('/api/orders/' + encodeURIComponent(id));
    const d = await r.json();
    if(!d.success){
      showError(d.message || 'Order tidak ditemukan');
    } else {
      showResult(d.order);
    }
  } catch(e){
    showError('Gagal terhubung ke server. Coba lagi.');
  }
  btn.disabled = false; btn.textContent = 'Cek';
}

function showError(msg){
  const el = document.getElementById('error-box');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function showResult(o){
  currentOrder = o;
  document.getElementById('r-icon').textContent = o.game_icon || '🎮';
  document.getElementById('r-game').textContent = o.game_name || '—';
  document.getElementById('r-pkg').textContent = o.package_name || '—';
  document.getElementById('r-id').textContent = o.order_id;
  document.getElementById('r-account').textContent = o.customer_name ? `${o.customer_name} (${o.customer_no})` : o.customer_no;
  document.getElementById('r-total').textContent = fmt(o.total_amount);
  document.getElementById('r-method').textContent = (o.payment_method||'—').toUpperCase();
  document.getElementById('r-pay-status').innerHTML = badge(o.payment_status);
  document.getElementById('r-topup-status').innerHTML = badge(o.topup_status);
  document.getElementById('r-date').textContent = fmtDate(o.created_at);

  if(o.sn){
    document.getElementById('r-sn').textContent = o.sn;
    document.getElementById('r-sn-row').style.display = 'flex';
  } else {
    document.getElementById('r-sn-row').style.display = 'none';
  }

  // Tampilkan tombol bayar kalau belum bayar dan ada payment_url
  const payBtn = document.getElementById('pay-btn');
  payBtn.style.display = (o.payment_status === 'unpaid' && o.payment_url) ? 'block' : 'none';

  document.getElementById('result-box').style.display = 'block';
}

function goPayment(){
  if(currentOrder?.order_id){
    window.location.href = '/payment?order_id=' + currentOrder.order_id;
  }
}

// Auto-fill dari URL param ?order_id=xxx
const urlId = new URLSearchParams(window.location.search).get('order_id');
if(urlId){
  document.getElementById('order-id-inp').value = urlId;
  document.getElementById('cek-btn').disabled = false;
  cekOrder();
}
</script>
</body>
</html>
