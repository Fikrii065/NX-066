<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk / Daftar — GameFlash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --surface:#16161f;
  --border:rgba(255,255,255,0.08);
  --text:#f0f0f5;
  --text2:#9090a8;
  --accent:#6c47ff;
  --accent-glow:rgba(108,71,255,0.35);
  --success:#22c55e;
  --error:#f08080;
  --radius:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,71,255,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.card{
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:var(--radius);
  padding:36px 32px;
  width:100%;
  max-width:420px;
  position:relative;
}
/* Logo */
.logo{
  display:flex;align-items:center;gap:10px;
  margin-bottom:28px;
  justify-content:center;
}
.logo-icon{
  width:40px;height:40px;
  background:var(--accent);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--accent-glow);
}
.logo-icon svg{width:22px;height:22px;fill:#fff}
.logo-name{font-size:20px;font-weight:700;letter-spacing:-0.4px}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* Tabs */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.04);
  border-radius:10px;
  padding:3px;
  margin-bottom:28px;
  gap:3px;
}
.tab{
  flex:1;
  height:38px;
  border:none;
  background:transparent;
  color:var(--text2);
  font-size:14px;
  font-weight:600;
  border-radius:8px;
  cursor:pointer;
  transition:background .2s,color .2s;
  font-family:inherit;
}
.tab.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 2px 12px var(--accent-glow);
}

/* Forms */
.form{display:none;flex-direction:column;gap:16px;}
.form.active{display:flex;}

.field-group{display:flex;flex-direction:column;gap:6px;}
label{font-size:12px;font-weight:500;color:var(--text2);}
input{
  height:44px;
  background:rgba(255,255,255,0.05);
  border:0.5px solid var(--border);
  border-radius:10px;
  padding:0 14px;
  font-size:14px;
  color:var(--text);
  outline:none;
  transition:border-color .15s,box-shadow .15s;
  font-family:inherit;
  width:100%;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
input::placeholder{color:rgba(144,144,168,0.5);}

.btn{
  width:100%;height:46px;
  background:var(--accent);
  color:#fff;border:none;
  border-radius:10px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  transition:opacity .15s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;
  margin-top:4px;
}
.btn:hover:not(:disabled){opacity:.9;}
.btn:active:not(:disabled){transform:scale(.99);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

.msg-box{
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
  display:none;
}
.msg-box.error{background:rgba(163,45,45,.15);border:0.5px solid rgba(163,45,45,.3);color:var(--error);}
.msg-box.success{background:rgba(34,197,94,.1);border:0.5px solid rgba(34,197,94,.3);color:var(--success);}

.hint{font-size:12px;color:var(--text2);margin-top:-6px;}

.back-link{
  display:block;text-align:center;
  font-size:13px;color:var(--text2);
  text-decoration:none;margin-top:20px;
  transition:color .15s;
}
.back-link:hover{color:var(--text);}
</style>
</head>
<body>
<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div>
      <div class="logo-name">GameFlash</div>
      <div class="logo-sub">Top Up Game Instan</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Masuk</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Daftar</button>
  </div>

  <!-- ── LOGIN FORM ── -->
  <div class="form active" id="form-login">
    <div class="msg-box error" id="login-err"></div>
    <div class="msg-box success" id="login-ok"></div>

    <div class="field-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="email@kamu.com" autocomplete="email">
    </div>
    <div class="field-group">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">
      <span id="btn-login-text">Masuk</span>
      <div class="spinner" id="spin-login"></div>
    </button>

    <p style="text-align:center;font-size:13px;color:var(--text2);">
      Belum punya akun?
      <a href="#" onclick="switchTab('register');return false;" style="color:var(--accent);text-decoration:none;font-weight:600;">Daftar sekarang</a>
    </p>
  </div>

  <!-- ── REGISTER FORM ── -->
  <div class="form" id="form-register">
    <div class="msg-box error" id="reg-err"></div>
    <div class="msg-box success" id="reg-ok"></div>

    <div class="field-group">
      <label for="reg-name">Nama Lengkap</label>
      <input type="text" id="reg-name" placeholder="Nama kamu" autocomplete="name">
    </div>
    <div class="field-group">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="email@kamu.com" autocomplete="email">
    </div>
    <div class="field-group">
      <label for="reg-phone">Nomor WhatsApp <span style="color:var(--text2);font-weight:400;">(opsional)</span></label>
      <input type="tel" id="reg-phone" placeholder="08xxxxxxxxxx">
    </div>
    <div class="field-group">
      <label for="reg-pass">Password</label>
      <input type="password" id="reg-pass" placeholder="Min. 8 karakter + angka" autocomplete="new-password">
      <span class="hint">Minimal 8 karakter, harus mengandung huruf dan angka.</span>
    </div>
    <div class="field-group">
      <label for="reg-pass2">Konfirmasi Password</label>
      <input type="password" id="reg-pass2" placeholder="Ulangi password" autocomplete="new-password">
    </div>

    <button class="btn" id="btn-reg" onclick="doRegister()">
      <span id="btn-reg-text">Buat Akun</span>
      <div class="spinner" id="spin-reg"></div>
    </button>

    <p style="text-align:center;font-size:13px;color:var(--text2);">
      Sudah punya akun?
      <a href="#" onclick="switchTab('login');return false;" style="color:var(--accent);text-decoration:none;font-weight:600;">Masuk di sini</a>
    </p>
  </div>

  <a href="/" class="back-link">← Kembali ke Toko</a>
</div>

<script>
  // Redirect jika sudah login
  const token = localStorage.getItem('gf_user_token');
  if (token) window.location.href = '/';

  // Cek query string untuk tab awal
  const params = new URLSearchParams(location.search);
  if (params.get('tab') === 'register') switchTab('register');

  function switchTab(tab) {
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    // Bersihkan pesan
    ['login-err','login-ok','reg-err','reg-ok'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg-box ' + type;
    el.style.display = 'block';
  }

  function setLoading(btnId, textId, spinId, loading) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(textId).style.display = loading ? 'none' : '';
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
  }

  // ── LOGIN ──
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    document.getElementById('login-err').style.display = 'none';
    document.getElementById('login-ok').style.display  = 'none';

    if (!email || !password) {
      showMsg('login-err', 'Email dan password wajib diisi', 'error');
      return;
    }

    setLoading('btn-login','btn-login-text','spin-login', true);
    try {
      const res  = await fetch('/api/users/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('gf_user_token', data.token);
        localStorage.setItem('gf_user', JSON.stringify(data.user));
        showMsg('login-ok', 'Login berhasil! Mengalihkan…', 'success');
        setTimeout(() => window.location.href = '/', 800);
      } else {
        showMsg('login-err', data.message || 'Login gagal', 'error');
      }
    } catch {
      showMsg('login-err', 'Tidak dapat terhubung ke server', 'error');
    }
    setLoading('btn-login','btn-login-text','spin-login', false);
  }

  // ── REGISTER ──
  document.getElementById('reg-pass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-pass').value;
    const password2= document.getElementById('reg-pass2').value;
    document.getElementById('reg-err').style.display = 'none';
    document.getElementById('reg-ok').style.display  = 'none';

    if (!name || !email || !password) {
      showMsg('reg-err', 'Nama, email, dan password wajib diisi', 'error');
      return;
    }
    if (password !== password2) {
      showMsg('reg-err', 'Konfirmasi password tidak cocok', 'error');
      return;
    }
    if (password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)) {
      showMsg('reg-err', 'Password minimal 8 karakter dan harus mengandung huruf serta angka', 'error');
      return;
    }

    setLoading('btn-reg','btn-reg-text','spin-reg', true);
    try {
      const res  = await fetch('/api/users/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, phone: phone || undefined, password }),
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('gf_user_token', data.token);
        localStorage.setItem('gf_user', JSON.stringify(data.user));
        showMsg('reg-ok', 'Akun berhasil dibuat! Mengalihkan…', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } else {
        showMsg('reg-err', data.message || 'Pendaftaran gagal', 'error');
      }
    } catch {
      showMsg('reg-err', 'Tidak dapat terhubung ke server', 'error');
    }
    setLoading('btn-reg','btn-reg-text','spin-reg', false);
  }
</script>
</body>
</html>
