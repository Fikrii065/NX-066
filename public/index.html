<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topup Clone</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

.logo {font-weight:bold;}

/* SLIDER */
.slider {
  overflow:hidden;
  padding:10px;
  position:relative;
}

.slides {
  display:flex;
  transition:0.4s;
}

.slides img {
  width:90%;
  margin-right:10px;
  border-radius:15px;
}

.dots {
  text-align:center;
  margin-top:5px;
}

.dot {
  display:inline-block;
  width:6px;
  height:6px;
  background:#555;
  border-radius:50%;
  margin:3px;
}

.dot.active {
  background:orange;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
  padding:10px;
}

.tabs button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#2a2a2a;
  color:white;
}

.tabs .active {
  background:orange;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  padding:12px;
}

.card {
  background:#1c1c1c;
  border-radius:15px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:110px;
  object-fit:cover;
}

.card h4 {
  margin:8px;
  font-size:13px;
}

.card p {
  margin:0 8px 8px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">TOPUP GAME</div>
  <div>
    🔍 ID / IDR ☰
  </div>
</div>

<!-- SLIDER -->
<div class="slider" id="slider">
  <div class="slides" id="slides">
    <img src="https://picsum.photos/800/300?1">
    <img src="https://picsum.photos/800/300?2">
    <img src="https://picsum.photos/800/300?3">
  </div>
  <div class="dots" id="dots"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="active">Games</button>
  <button>Voucher</button>
  <button>App Premium</button>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>
/* DATA GAME */
const games = [
"Mobile Legends","Free Fire","PUBG Mobile",
"Genshin Impact","Valorant","Arena of Valor",
"Call of Duty Mobile","Point Blank","Zepeto"
];

const grid = document.getElementById("grid");

games.forEach(name=>{
  const el = document.createElement("div");
  el.className="card";
  el.innerHTML=`
    <img src="https://picsum.photos/300/200?random=${Math.random()}">
    <h4>${name}</h4>
    <p>Topup Game</p>
  `;
  grid.appendChild(el);
});

/* SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

/* DOTS */
const dots = document.getElementById("dots");
for(let i=0;i<total;i++){
  const d=document.createElement("span");
  d.className="dot";
  dots.appendChild(d);
}

function updateDots(){
  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i===index);
  });
}

updateDots();

/* AUTO */
setInterval(()=>{
  index = (index+1)%total;
  slides.style.transform = `translateX(-${index*95}%)`;
  updateDots();
},3000);

/* SWIPE */
let startX=0;

document.getElementById("slider").addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.getElementById("slider").addEventListener("touchend",e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    index = (index+1)%total;
  } else if(endX - startX > 50){
    index = (index-1+total)%total;
  }

  slides.style.transform = `translateX(-${index*95}%)`;
  updateDots();
});

/* TAB */
document.querySelectorAll(".tabs button").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  };
});
</script>

</body>
</html>
