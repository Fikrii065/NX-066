<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Order — GameFlash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f8f8f5;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#6c47ff;--accent-light:#eeebff;--accent-text:#3d1fa8;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --amber:#7a4a0a;--amber-bg:#fdf3dc;
  --red:#a32d2d;--red-bg:#fcebeb;
  --radius:14px;--radius-sm:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.header{background:var(--surface);border-bottom:.5px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:17px;height:17px;fill:#fff}
.header h1{font-size:16px;font-weight:600}
.header a{margin-left:auto;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}
.container{max-width:560px;margin:0 auto;padding:24px 16px}

.hero{text-align:center;margin-bottom:28px}
.hero h2{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:8px}
.hero p{font-size:14px;color:var(--text2)}

/* Search box */
.search-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.input-row{display:flex;gap:8px}
input.field{
  flex:1;height:44px;
  border:.5px solid var(--border2);border-radius:var(--radius-sm);
  padding:0 14px;font-size:14px;color:var(--text);background:var(--surface);
  outline:none;transition:border-color .15s;font-family:inherit;
}
input.field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,71,255,.12)}
input.field::placeholder{color:var(--text3)}
.btn-cari{
  height:44px;padding:0 20px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:opacity .15s;font-family:inherit;white-space:nowrap;
}
.btn-cari:hover{opacity:.9}
.btn-cari:disabled{opacity:.5;cursor:not-allowed}

/* Result */
.result-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}
.status-strip{padding:16px 20px;display:flex;align-items:center;gap:14px}
.status-strip.success{background:var(--green-bg)}
.status-strip.processing{background:#e6f1fb}
.status-strip.unpaid{background:var(--amber-bg)}
.status-strip.failed,.status-strip.expired{background:var(--red-bg)}
.status-emoji{font-size:28px}
.status-title{font-size:15px;font-weight:600}
.status-desc{font-size:13px;margin-top:3px;opacity:.75}
.detail-section{padding:16px 20px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.detail-row+.detail-row{border-top:.5px solid var(--border)}
.detail-key{font-size:13px;color:var(--text2)}
.detail-val{font-size:13px;font-weight:500;text-align:right;max-width:55%}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.green{background:var(--green-bg);color:var(--green)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.blue{background:#e6f1fb;color:#185fa5}
.badge.red{background:var(--red-bg);color:var(--red)}
.action-bar{padding:14px 20px;border-top:.5px solid var(--border);display:flex;gap:8px}
.btn-action{
  flex:1;height:40px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  text-decoration:none;font-family:inherit;transition:opacity .15s;
}
.btn-action.primary{background:var(--accent);color:#fff;border:none}
.btn-action.outline{background:transparent;color:var(--text2);border:.5px solid var(--border2)}
.btn-action:hover{opacity:.85}

/* Error */
.error-box{
  background:var(--red-bg);border:.5px solid rgba(163,45,45,.2);
  border-radius:var(--radius-sm);padding:12px 16px;
  font-size:13px;color:var(--red);display:none;margin-top:10px;
}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
</style>
</head>
<body>

<header class="header">
  <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
  <h1>GameFlash</h1>
  <a href="/">← Beranda</a>
</header>

<div class="container">
  <div class="hero">
    <div style="font-size:36px;margin-bottom:12px">🔍</div>
    <h2>Cek Status Pesanan</h2>
    <p>Masukkan Order ID untuk melihat status transaksi kamu</p>
  </div>

  <div class="search-card">
    <div class="input-row">
      <input class="field" type="text" id="order-input" placeholder="Contoh: GF1A2B3C4D" maxlength="20" style="text-transform:uppercase">
      <button class="btn-cari" id="search-btn" onclick="searchOrder()">
        <span id="search-text">Cari</span>
        <div class="spinner hidden" id="search-spin"></div>
      </button>
    </div>
    <div class="error-box" id="error-box"></div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="status-strip" id="result-strip">
      <div class="status-emoji" id="result-emoji"></div>
      <div>
        <div class="status-title" id="result-title"></div>
        <div class="status-desc" id="result-desc"></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-row">
        <span class="detail-key">Order ID</span>
        <span class="detail-val" id="r-order-id" style="font-family:monospace;font-size:12px"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Game</span>
        <span class="detail-val" id="r-game"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Paket</span>
        <span class="detail-val" id="r-package"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Akun</span>
        <span class="detail-val" id="r-account"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Total Bayar</span>
        <span class="detail-val" id="r-total"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Metode</span>
        <span class="detail-val" id="r-method"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Status Bayar</span>
        <span class="detail-val" id="r-pay-status"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Status Top Up</span>
        <span class="detail-val" id="r-topup-status"></span>
      </div>
      <div class="detail-row" id="r-sn-row" style="display:none">
        <span class="detail-key">Serial Number</span>
        <span class="detail-val" id="r-sn" style="font-family:monospace;font-size:12px"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Waktu Pesan</span>
        <span class="detail-val" id="r-time"></span>
      </div>
    </div>
    <div class="action-bar">
      <a class="btn-action outline" href="/cek-order">Cari Lain</a>
      <a class="btn-action primary" id="r-payment-link" href="#" target="_blank">Bayar Sekarang</a>
    </div>
  </div>
</div>

<script>
const fmt = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');

const PAY_LABEL = {
  bca_va:'BCA Virtual Account', bni_va:'BNI Virtual Account', bri_va:'BRI Virtual Account',
  mandiri_va:'Mandiri VA', dana:'DANA', ovo:'OVO', gopay:'GoPay', shopeepay:'ShopeePay', qris:'QRIS',
};

// Pre-fill from URL
const params = new URLSearchParams(window.location.search);
const preId  = params.get('id');
if (preId) {
  document.getElementById('order-input').value = preId.toUpperCase();
  searchOrder();
}

document.getElementById('order-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchOrder();
});

async function searchOrder() {
  const orderId = document.getElementById('order-input').value.trim().toUpperCase();
  const errBox  = document.getElementById('error-box');
  const btn     = document.getElementById('search-btn');
  const text    = document.getElementById('search-text');
  const spin    = document.getElementById('search-spin');
  const card    = document.getElementById('result-card');

  errBox.style.display = 'none';
  card.style.display   = 'none';

  if (!orderId) {
    errBox.textContent   = 'Masukkan Order ID terlebih dahulu';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  text.classList.add('hidden');
  spin.classList.remove('hidden');

  try {
    const res  = await fetch(`/api/orders/${orderId}`);
    const data = await res.json();

    if (!data.success) {
      errBox.textContent   = 'Order tidak ditemukan. Pastikan ID pesanan sudah benar.';
      errBox.style.display = 'block';
    } else {
      renderResult(data.order);
    }
  } catch (e) {
    errBox.textContent   = 'Tidak dapat terhubung ke server. Coba lagi.';
    errBox.style.display = 'block';
  }

  btn.disabled = false;
  text.classList.remove('hidden');
  spin.classList.add('hidden');
}

function renderResult(o) {
  // Status strip
  const strip = document.getElementById('result-strip');
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const desc  = document.getElementById('result-desc');

  const topup = o.topup_status;
  const pay   = o.payment_status;

  if (topup === 'success') {
    strip.className = 'status-strip success';
    emoji.textContent = '✅';
    title.textContent = 'Top Up Berhasil!';
    desc.textContent  = 'Item sudah masuk ke akun game kamu.';
  } else if (topup === 'processing' || pay === 'paid') {
    strip.className = 'status-strip processing';
    emoji.textContent = '⚙️';
    title.textContent = 'Sedang Diproses';
    desc.textContent  = 'Pembayaran diterima, top up sedang diproses.';
  } else if (pay === 'unpaid') {
    strip.className = 'status-strip unpaid';
    emoji.textContent = '⏳';
    title.textContent = 'Menunggu Pembayaran';
    desc.textContent  = 'Selesaikan pembayaran untuk melanjutkan top up.';
  } else if (pay === 'expired') {
    strip.className = 'status-strip expired';
    emoji.textContent = '❌';
    title.textContent = 'Pembayaran Kadaluarsa';
    desc.textContent  = 'Waktu pembayaran telah habis. Buat pesanan baru.';
  } else if (topup === 'failed') {
    strip.className = 'status-strip failed';
    emoji.textContent = '⚠️';
    title.textContent = 'Top Up Gagal';
    desc.textContent  = 'Hubungi CS untuk bantuan. Sebutkan Order ID kamu.';
  }

  const payBadge   = { paid: 'green', unpaid: 'amber', expired: 'red', failed: 'red' };
  const topupBadge = { success: 'green', processing: 'blue', pending: 'amber', failed: 'red', refunded: 'blue' };
  const payLabel   = { paid: 'Lunas', unpaid: 'Belum Bayar', expired: 'Kadaluarsa', failed: 'Gagal' };
  const topupLabel = { success: 'Berhasil', processing: 'Diproses', pending: 'Menunggu', failed: 'Gagal', refunded: 'Refund' };

  document.getElementById('r-order-id').textContent    = o.order_id;
  document.getElementById('r-game').textContent        = `${o.game_icon || ''} ${o.game_name}`;
  document.getElementById('r-package').textContent     = o.package_name;
  document.getElementById('r-account').textContent     = o.customer_no + (o.customer_name ? ` (${o.customer_name})` : '');
  document.getElementById('r-total').textContent       = fmt(o.total_amount);
  document.getElementById('r-method').textContent      = PAY_LABEL[o.payment_method] || o.payment_method;
  document.getElementById('r-pay-status').innerHTML    = `<span class="badge ${payBadge[pay] || 'amber'}">${payLabel[pay] || pay}</span>`;
  document.getElementById('r-topup-status').innerHTML  = `<span class="badge ${topupBadge[topup] || 'amber'}">${topupLabel[topup] || topup}</span>`;
  document.getElementById('r-time').textContent        = new Date(o.created_at).toLocaleString('id-ID',{dateStyle:'medium',timeStyle:'short'});

  if (o.sn) {
    document.getElementById('r-sn-row').style.display = 'flex';
    document.getElementById('r-sn').textContent = o.sn;
  } else {
    document.getElementById('r-sn-row').style.display = 'none';
  }

  // Action buttons
  const payLink = document.getElementById('r-payment-link');
  if (pay === 'unpaid' && o.payment_url) {
    payLink.href        = o.payment_url;
    payLink.textContent = 'Lanjutkan Pembayaran →';
    payLink.style.display = '';
  } else if (pay === 'unpaid') {
    payLink.href        = `/payment?order_id=${o.order_id}`;
    payLink.textContent = 'Lihat Detail Pembayaran';
    payLink.style.display = '';
  } else {
    payLink.style.display = 'none';
  }

  document.getElementById('result-card').style.display = 'block';
}
</script>
</body>
</html>
