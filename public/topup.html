<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Game — GameFlash</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f8f8f5;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text2: #666;
    --text3: #999;
    --accent: #6c47ff;
    --accent-light: #eeebff;
    --accent-text: #3d1fa8;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
  }
  .header-logo svg { width: 18px; height: 18px; fill: #fff; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header span { font-size: 13px; color: var(--text3); }

  /* ── Layout ── */
  .container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }

  /* ── Step badges ── */
  .step-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .step-badge {
    width: 18px; height: 18px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Section card ── */
  .section {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .section.disabled { opacity: 0.45; pointer-events: none; }

  /* ── Game grid ── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
  }
  .game-item {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .game-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .game-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .game-item.selected .game-name { color: var(--accent-text); font-weight: 600; }
  .game-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    margin: 0 auto 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: var(--surface2);
  }
  .game-name { font-size: 11px; color: var(--text2); line-height: 1.3; }

  /* ── Form inputs ── */
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .input-group:last-child.half { flex: 0 0 120px; }
  label.field-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input.field {
    height: 40px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  input.field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,71,255,0.12); }
  input.field::placeholder { color: var(--text3); }

  /* ── Nickname check result ── */
  .nickname-result {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-top: 10px;
  }
  .nickname-result.success { display: flex; background: var(--success-bg); color: var(--success); }
  .nickname-result.error   { display: flex; background: var(--danger-bg);  color: var(--danger);  }
  .nickname-result svg { width: 15px; height: 15px; flex-shrink: 0; }

  .check-btn {
    height: 40px;
    padding: 0 14px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, border-color .15s;
    align-self: flex-end;
  }
  .check-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .check-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Package grid ── */
  .pkg-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .pkg-item {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    cursor: pointer;
    background: var(--surface);
    transition: border-color .15s, background .15s;
    user-select: none;
    position: relative;
  }
  .pkg-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .pkg-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .pkg-badge {
    position: absolute; top: -1px; right: -1px;
    background: var(--accent); color: #fff;
    font-size: 9px; font-weight: 600;
    padding: 2px 7px;
    border-radius: 0 var(--radius-sm) 0 var(--radius-sm);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .pkg-amount { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .pkg-label  { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .pkg-price  { font-size: 13px; font-weight: 600; color: var(--accent); }
  .pkg-item.selected .pkg-price { color: var(--accent-text); }

  /* ── Payment methods ── */
  .pay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .pay-group-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }
  .pay-item {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .pay-item:hover { border-color: var(--accent); background: var(--accent-light); }
  .pay-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .pay-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .pay-name  { font-size: 12px; font-weight: 500; }
  .pay-fee   { font-size: 10px; color: var(--text3); }
  .pay-item.selected .pay-name { color: var(--accent-text); }

  /* ── Order summary ── */
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
  .summary-row + .summary-row { border-top: 0.5px solid var(--border); }
  .summary-key   { font-size: 13px; color: var(--text2); }
  .summary-val   { font-size: 13px; font-weight: 500; }
  .summary-total .summary-key { font-size: 14px; font-weight: 600; color: var(--text); }
  .summary-total .summary-val { font-size: 16px; font-weight: 700; color: var(--accent); }

  /* ── Submit ── */
  .submit-btn {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: opacity .15s, transform .1s;
  }
  .submit-btn:hover:not(:disabled) { opacity: .9; }
  .submit-btn:active:not(:disabled) { transform: scale(0.99); }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Loading overlay ── */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
  </div>
  <div>
    <h1>GameFlash</h1>
    <span>Top Up Game Instan</span>
  </div>
</header>

<div class="container">

  <!-- STEP 1: Pilih Game -->
  <div class="step-label"><span class="step-badge">1</span> Pilih Game</div>
  <div class="section" id="sec-game">
    <div class="game-grid" id="game-grid"></div>
  </div>

  <!-- STEP 2: ID Akun -->
  <div class="step-label"><span class="step-badge">2</span> Masukkan ID Akun</div>
  <div class="section disabled" id="sec-id">
    <div class="input-row" id="id-inputs">
      <div class="input-group">
        <label class="field-label" for="userId">User ID</label>
        <input class="field" id="userId" type="text" placeholder="Masukkan User ID" inputmode="numeric">
      </div>
    </div>
    <div class="nickname-result" id="nickname-result">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>
      <span id="nickname-text"></span>
    </div>
  </div>

  <!-- STEP 3: Pilih Paket -->
  <div class="step-label"><span class="step-badge">3</span> Pilih Nominal</div>
  <div class="section disabled" id="sec-pkg">
    <div class="pkg-grid" id="pkg-grid"></div>
  </div>

  <!-- STEP 4: Metode Bayar -->
  <div class="step-label"><span class="step-badge">4</span> Metode Pembayaran</div>
  <div class="section disabled" id="sec-pay">
    <div class="pay-group-title">Virtual Account</div>
    <div class="pay-grid" id="pay-va"></div>
    <div class="pay-group-title">E-Wallet</div>
    <div class="pay-grid" id="pay-ewallet"></div>
  </div>

  <!-- STEP 5: Ringkasan -->
  <div class="step-label"><span class="step-badge">5</span> Ringkasan Pesanan</div>
  <div class="section disabled" id="sec-summary">
    <div id="summary-rows"></div>
    <button class="submit-btn" id="submit-btn" disabled>
      <span id="submit-text">Bayar Sekarang</span>
      <div class="spinner" id="submit-spinner"></div>
    </button>
  </div>

</div>

<script>
const GAMES = [
  { id:'mobile-legends',        name:'Mobile Legends', icon:'⚔️',  needZone:false, zoneName:null        },
  { id:'mobile-legends-region', name:'ML Region',      icon:'🗺️',  needZone:true,  zoneName:'Zone ID'   },
  { id:'free-fire',             name:'Free Fire',      icon:'🔥',  needZone:false, zoneName:null        },
  { id:'free-fire-max',         name:'FF MAX',         icon:'💥',  needZone:false, zoneName:null        },
  { id:'pubgm',                 name:'PUBG Mobile',    icon:'🪖',  needZone:false, zoneName:null        },
  { id:'valorant',              name:'Valorant',       icon:'🎯',  needZone:false, zoneName:null        },
  { id:'genshin-impact',        name:'Genshin Impact', icon:'🌸',  needZone:true,  zoneName:'Zone'      },
  { id:'honkai-star-rail',      name:'Honkai: SR',     icon:'🚂',  needZone:true,  zoneName:'Zone'      },
  { id:'pointblank',            name:'Point Blank',    icon:'🎮',  needZone:false, zoneName:null        },
];

const PACKAGES = {
  'mobile-legends': [
    { sku:'ML-11',    amount:'11 Diamonds',   price:3500,  hot:false },
    { sku:'ML-22',    amount:'22 Diamonds',   price:6800,  hot:false },
    { sku:'ML-56',    amount:'56 Diamonds',   price:15500, hot:false },
    { sku:'ML-86',    amount:'86 Diamonds',   price:23500, hot:true  },
    { sku:'ML-172',   amount:'172 Diamonds',  price:46500, hot:false },
    { sku:'ML-257',   amount:'257 Diamonds',  price:69500, hot:false },
    { sku:'ML-344',   amount:'344 Diamonds',  price:92500, hot:true  },
    { sku:'ML-429',   amount:'429 Diamonds',  price:115000,hot:false },
    { sku:'ML-514',   amount:'514 Diamonds',  price:138000,hot:false },
    { sku:'ML-706',   amount:'706 Diamonds',  price:189000,hot:false },
    { sku:'ML-WKPASS',amount:'Weekly Pass',   price:31500, hot:true  },
  ],
  'free-fire': [
    { sku:'FF-70',  amount:'70 Diamond',   price:14000, hot:false },
    { sku:'FF-140', amount:'140 Diamond',  price:27500, hot:true  },
    { sku:'FF-210', amount:'210 Diamond',  price:41000, hot:false },
    { sku:'FF-355', amount:'355 Diamond',  price:68000, hot:false },
    { sku:'FF-720', amount:'720 Diamond',  price:135000,hot:true  },
  ],
  'default': [
    { sku:'PKG-50',  amount:'50 Credits',  price:15000, hot:false },
    { sku:'PKG-100', amount:'100 Credits', price:29000, hot:true  },
    { sku:'PKG-200', amount:'200 Credits', price:57000, hot:false },
    { sku:'PKG-500', amount:'500 Credits', price:139000,hot:false },
  ],
};

const PAYMENTS = {
  va: [
    { id:'bca_va',     name:'BCA Virtual Account',     icon:'🏦', fee:0    },
    { id:'bni_va',     name:'BNI Virtual Account',     icon:'🏦', fee:0    },
    { id:'bri_va',     name:'BRI Virtual Account',     icon:'🏦', fee:0    },
    { id:'mandiri_va', name:'Mandiri Virtual Account', icon:'🏦', fee:4000 },
  ],
  ewallet: [
    { id:'dana',      name:'DANA',      icon:'💳', fee:1000 },
    { id:'ovo',       name:'OVO',       icon:'💜', fee:1000 },
    { id:'gopay',     name:'GoPay',     icon:'💚', fee:1500 },
    { id:'shopeepay', name:'ShopeePay', icon:'🧡', fee:1000 },
    { id:'qris',      name:'QRIS',      icon:'📱', fee:1500 },
  ],
};

let state = { game:null, userId:'', zoneId:'', nicknameVerified:false, nickname:'', pkg:null, payment:null };

function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

// ── Render game grid ──────────────────────────────────────────────────────────
const gameGrid = document.getElementById('game-grid');
GAMES.forEach(g => {
  const el = document.createElement('div');
  el.className = 'game-item';
  el.innerHTML = `<div class="game-icon">${g.icon}</div><div class="game-name">${g.name}</div>`;
  el.onclick = () => selectGame(g);
  gameGrid.appendChild(el);
});

function selectGame(g) {
  state.game = g; state.userId=''; state.zoneId=''; state.nicknameVerified=false; state.nickname=''; state.pkg=null; state.payment=null;
  document.querySelectorAll('.game-item').forEach((el,i)=>el.classList.toggle('selected', GAMES[i].id===g.id));
  buildIdSection(g);
  enable('sec-id');
  disable('sec-pkg'); disable('sec-pay'); disable('sec-summary');
  document.getElementById('nickname-result').className = 'nickname-result';
  renderPkgs(); renderSummary();
}

// ── Build ID input section ────────────────────────────────────────────────────
function buildIdSection(g) {
  const row = document.getElementById('id-inputs');
  let html = `<div class="input-group">
    <label class="field-label" for="userId">User ID</label>
    <input class="field" id="userId" type="text" placeholder="Masukkan User ID" inputmode="numeric" oninput="onIdInput()">
  </div>`;
  if (g.needZone) {
    html += `<div class="input-group half">
      <label class="field-label" for="zoneId">${g.zoneName}</label>
      <input class="field" id="zoneId" type="text" placeholder="Contoh: 1234" inputmode="numeric" oninput="onIdInput()">
    </div>`;
  }
  html += `<button class="check-btn" id="check-btn" onclick="checkNickname()" disabled>Cek Akun</button>`;
  row.innerHTML = html;
}

function onIdInput() {
  const uid = document.getElementById('userId')?.value?.trim() || '';
  const zid = document.getElementById('zoneId')?.value?.trim() || '';
  state.userId = uid; state.zoneId = zid;
  state.nicknameVerified = false; state.nickname = '';
  document.getElementById('nickname-result').className = 'nickname-result';

  const g = state.game;
  const ready = uid.length > 0 && (!g.needZone || zid.length > 0);
  document.getElementById('check-btn').disabled = !ready;

  disable('sec-pkg'); disable('sec-pay'); disable('sec-summary');
  state.pkg = null; state.payment = null;
  renderPkgs(); renderSummary();
}

// ── Check nickname ────────────────────────────────────────────────────────────
async function checkNickname() {
  const btn = document.getElementById('check-btn');
  const res  = document.getElementById('nickname-result');
  const txt  = document.getElementById('nickname-text');
  btn.disabled = true; btn.textContent = 'Mengecek...';

  try {
    const params = new URLSearchParams({ game: state.game.id, userId: state.userId });
    if (state.zoneId) params.append('zoneId', state.zoneId);
    const r = await fetch(`/api/check-nickname?${params}`);
    const data = await r.json();

    if (data.success) {
      state.nicknameVerified = true; state.nickname = data.nickname;
      res.className = 'nickname-result success';
      res.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg><span>Akun ditemukan: <strong>${data.nickname}</strong></span>`;
      enable('sec-pkg'); renderPkgs();
    } else {
      res.className = 'nickname-result error';
      res.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg><span>${data.message || 'Akun tidak ditemukan, periksa kembali ID kamu'}</span>`;
      disable('sec-pkg'); disable('sec-pay'); disable('sec-summary');
    }
  } catch(e) {
    res.className = 'nickname-result error';
    res.innerHTML = `<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg><span>Gagal terhubung ke server. Coba lagi.</span>`;
  }
  btn.disabled = false; btn.textContent = 'Cek Akun';
}

// ── Render packages ───────────────────────────────────────────────────────────
function renderPkgs() {
  const grid = document.getElementById('pkg-grid');
  if (!state.game) { grid.innerHTML=''; return; }
  const pkgs = PACKAGES[state.game.id] || PACKAGES['default'];
  grid.innerHTML = pkgs.map(p => `
    <div class="pkg-item${state.pkg?.sku===p.sku?' selected':''}" onclick="selectPkg(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      ${p.hot ? '<div class="pkg-badge">Hot</div>' : ''}
      <div class="pkg-amount">${p.amount}</div>
      <div class="pkg-label">${state.game.name}</div>
      <div class="pkg-price">${fmt(p.price)}</div>
    </div>`).join('');
}

function selectPkg(p) {
  state.pkg = p; state.payment = null;
  renderPkgs();
  enable('sec-pay'); renderPayments();
  disable('sec-summary'); renderSummary();
}

// ── Render payments ───────────────────────────────────────────────────────────
function renderPayments() {
  document.getElementById('pay-va').innerHTML = PAYMENTS.va.map(p => payHTML(p)).join('');
  document.getElementById('pay-ewallet').innerHTML = PAYMENTS.ewallet.map(p => payHTML(p)).join('');
}
function payHTML(p) {
  const sel = state.payment?.id===p.id ? ' selected' : '';
  const fee = p.fee > 0 ? `+${fmt(p.fee)}` : 'Gratis';
  return `<div class="pay-item${sel}" onclick="selectPayment(${JSON.stringify(p).replace(/"/g,'&quot;')})">
    <div class="pay-icon">${p.icon}</div>
    <div><div class="pay-name">${p.name}</div><div class="pay-fee">${fee}</div></div>
  </div>`;
}

function selectPayment(p) {
  state.payment = p;
  renderPayments();
  enable('sec-summary'); renderSummary();
}

// ── Render summary ────────────────────────────────────────────────────────────
function renderSummary() {
  const el = document.getElementById('summary-rows');
  const btn = document.getElementById('submit-btn');
  if (!state.game || !state.pkg || !state.payment) { el.innerHTML=''; btn.disabled=true; return; }
  const total = state.pkg.price + state.payment.fee;
  el.innerHTML = `
    <div class="summary-row"><span class="summary-key">Game</span><span class="summary-val">${state.game.name}</span></div>
    <div class="summary-row"><span class="summary-key">Akun</span><span class="summary-val">${state.nickname} (${state.userId}${state.zoneId?'/'+state.zoneId:''})</span></div>
    <div class="summary-row"><span class="summary-key">Paket</span><span class="summary-val">${state.pkg.amount}</span></div>
    <div class="summary-row"><span class="summary-key">Harga</span><span class="summary-val">${fmt(state.pkg.price)}</span></div>
    <div class="summary-row"><span class="summary-key">Biaya layanan</span><span class="summary-val">${state.payment.fee>0?fmt(state.payment.fee):'Gratis'}</span></div>
    <div class="summary-row summary-total"><span class="summary-key">Total</span><span class="summary-val">${fmt(total)}</span></div>`;
  btn.disabled = false;
}

// ── Submit ────────────────────────────────────────────────────────────────────
document.getElementById('submit-btn').onclick = async () => {
  if (!state.game || !state.pkg || !state.payment || !state.nicknameVerified) return;
  const btn   = document.getElementById('submit-btn');
  const txt   = document.getElementById('submit-text');
  const spin  = document.getElementById('submit-spinner');
  btn.disabled=true; txt.style.display='none'; spin.style.display='block';

  try {
    const res = await fetch('/api/orders/create', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        game_id       : state.game.id,
        sku_code      : state.pkg.sku,
        customer_no   : state.userId + (state.zoneId ? '|' + state.zoneId : ''),
        zone_id       : state.zoneId || null,
        payment_method: state.payment.id,
        customer_name : state.nickname,
      }),
    });
    const data = await res.json();
    if (data.success && data.payment_url) {
      window.location.href = data.payment_url;
    } else {
      alert('Gagal membuat pesanan: ' + (data.message || 'Coba lagi'));
    }
  } catch(e) {
    alert('Terjadi kesalahan. Silakan coba lagi.');
  }
  btn.disabled=false; txt.style.display=''; spin.style.display='none';
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function enable(id)  { document.getElementById(id).classList.remove('disabled'); }
function disable(id) { document.getElementById(id).classList.add('disabled'); }
</script>
</body>
</html>
