<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran — GameFlash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f8f8f5;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#6c47ff;--accent-light:#eeebff;--accent-text:#3d1fa8;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --amber:#7a4a0a;--amber-bg:#fdf3dc;
  --red:#a32d2d;--red-bg:#fcebeb;
  --radius:14px;--radius-sm:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.header{background:var(--surface);border-bottom:.5px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:17px;height:17px;fill:#fff}
.header h1{font-size:16px;font-weight:600}
.header a{margin-left:auto;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}
.container{max-width:560px;margin:0 auto;padding:24px 16px}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,#e8e8e2 25%,#f0f0ea 50%,#e8e8e2 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px;height:18px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Status badge */
.status-banner{border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.status-banner.unpaid{background:var(--amber-bg);border:.5px solid rgba(122,74,10,.15)}
.status-banner.paid,.status-banner.success{background:var(--green-bg);border:.5px solid rgba(15,110,86,.15)}
.status-banner.expired,.status-banner.failed{background:var(--red-bg);border:.5px solid rgba(163,45,45,.15)}
.status-icon{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.status-banner.unpaid .status-icon{background:rgba(122,74,10,.12);color:var(--amber)}
.status-banner.paid .status-icon,.status-banner.success .status-icon{background:rgba(15,110,86,.12);color:var(--green)}
.status-banner.expired .status-icon,.status-banner.failed .status-icon{background:rgba(163,45,45,.12);color:var(--red)}
.status-title{font-size:15px;font-weight:600}
.status-sub{font-size:13px;margin-top:3px;opacity:.75}

/* Card */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* Detail rows */
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.detail-row+.detail-row{border-top:.5px solid var(--border)}
.detail-key{font-size:13px;color:var(--text2)}
.detail-val{font-size:13px;font-weight:500;text-align:right;max-width:55%}
.detail-total .detail-key{font-size:14px;font-weight:600;color:var(--text)}
.detail-total .detail-val{font-size:16px;font-weight:700;color:var(--accent)}

/* VA Box */
.va-box{
  background:var(--surface2);
  border:.5px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin:14px 0;
}
.va-number{font-family:monospace;font-size:22px;font-weight:700;letter-spacing:2px;color:var(--text)}
.copy-btn{
  height:34px;padding:0 14px;
  background:var(--accent);color:#fff;
  border:none;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:opacity .15s;
  font-family:inherit;
}
.copy-btn:hover{opacity:.9}
.copy-btn.copied{background:#0f6e56}

/* Countdown timer */
.timer-box{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:var(--amber-bg);
  border-radius:var(--radius-sm);
  border:.5px solid rgba(122,74,10,.15);
  margin-bottom:14px;
  font-size:13px;color:var(--amber);
}
.timer-box strong{font-size:16px;font-family:monospace}
.timer-box.urgent{background:var(--red-bg);border-color:rgba(163,45,45,.15);color:var(--red)}

/* Payment instructions */
.instruct-list{list-style:none;counter-reset:steps}
.instruct-list li{
  counter-increment:steps;
  display:flex;gap:12px;align-items:flex-start;
  padding:10px 0;border-bottom:.5px solid var(--border);
  font-size:13px;color:var(--text2);line-height:1.5;
}
.instruct-list li:last-child{border-bottom:none}
.instruct-list li::before{
  content:counter(steps);
  min-width:22px;height:22px;
  background:var(--accent-light);color:var(--accent-text);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;
}

/* Cek status btn */
.btn-check{
  width:100%;height:46px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:15px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s;font-family:inherit;margin-bottom:10px;
}
.btn-check:hover{opacity:.9}
.btn-outline{
  width:100%;height:46px;
  background:transparent;color:var(--text2);
  border:.5px solid var(--border2);border-radius:var(--radius-sm);
  font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;font-family:inherit;text-decoration:none;
}
.btn-outline:hover{background:var(--surface2)}

.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
</style>
</head>
<body>

<header class="header">
  <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
  <h1>GameFlash</h1>
  <a href="/">← Kembali</a>
</header>

<div class="container" id="container">
  <!-- Skeleton loading -->
  <div id="skeleton">
    <div style="height:80px;border-radius:14px;" class="skeleton"></div>
    <div style="height:200px;border-radius:14px;margin-top:14px" class="skeleton"></div>
    <div style="height:160px;border-radius:14px;margin-top:14px" class="skeleton"></div>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="content" class="hidden">

    <!-- Status banner -->
    <div class="status-banner" id="status-banner">
      <div class="status-icon" id="status-icon">⏳</div>
      <div>
        <div class="status-title" id="status-title">Menunggu Pembayaran</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
    </div>

    <!-- Countdown timer -->
    <div class="timer-box" id="timer-box">
      ⏱ Bayar sebelum: <strong id="countdown">--:--</strong>
    </div>

    <!-- Detail pesanan -->
    <div class="card">
      <div class="card-title">Detail Pesanan</div>
      <div class="detail-row">
        <span class="detail-key">Order ID</span>
        <span class="detail-val" id="d-order-id" style="font-family:monospace;font-size:12px"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Game</span>
        <span class="detail-val" id="d-game"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Paket</span>
        <span class="detail-val" id="d-package"></span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Akun</span>
        <span class="detail-val" id="d-account"></span>
      </div>
      <div class="detail-row detail-total">
        <span class="detail-key">Total Bayar</span>
        <span class="detail-val" id="d-total"></span>
      </div>
    </div>

    <!-- Metode pembayaran & nomor VA / instruksi -->
    <div class="card" id="payment-card">
      <div class="card-title" id="payment-card-title">Instruksi Pembayaran</div>
      <div id="payment-content"></div>
    </div>

    <!-- Actions -->
    <button class="btn-check" id="btn-check" onclick="checkStatus()">
      <span id="check-text">Cek Status Pembayaran</span>
      <div class="spinner hidden" id="check-spinner"></div>
    </button>
    <a href="/" class="btn-outline">🏠 Kembali ke Beranda</a>
  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden" style="text-align:center;padding:60px 20px">
    <div style="font-size:48px;margin-bottom:16px">😕</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:8px">Order tidak ditemukan</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:24px">Pastikan link yang kamu buka sudah benar.</div>
    <a href="/" class="btn-outline" style="max-width:200px;margin:0 auto">Kembali ke Beranda</a>
  </div>
</div>

<script>
const fmt = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');

const PAYMENT_INSTRUCTIONS = {
  bca_va: {
    label: 'BCA Virtual Account',
    icon: '🏦',
    steps: [
      'Buka aplikasi BCA Mobile atau m-BCA',
      'Pilih <strong>m-Transfer</strong> → <strong>BCA Virtual Account</strong>',
      'Masukkan nomor VA di bawah ini',
      'Periksa nama dan nominal, lalu konfirmasi',
      'Masukkan PIN BCA untuk menyelesaikan pembayaran',
    ],
  },
  bni_va: {
    label: 'BNI Virtual Account',
    icon: '🏦',
    steps: [
      'Buka aplikasi BNI Mobile Banking',
      'Pilih <strong>Transfer</strong> → <strong>Virtual Account Billing</strong>',
      'Masukkan nomor VA di bawah ini',
      'Periksa nama dan nominal, lalu lanjutkan',
      'Masukkan kata sandi untuk konfirmasi pembayaran',
    ],
  },
  bri_va: {
    label: 'BRI Virtual Account',
    icon: '🏦',
    steps: [
      'Buka aplikasi BRImo',
      'Pilih <strong>BRIVA</strong>',
      'Masukkan nomor VA di bawah ini',
      'Periksa detail, lalu masukkan PIN untuk bayar',
    ],
  },
  mandiri_va: {
    label: 'Mandiri Virtual Account',
    icon: '🏦',
    steps: [
      'Buka Livin\' by Mandiri',
      'Pilih <strong>Bayar</strong> → <strong>Multipayment</strong>',
      'Masukkan nomor VA di bawah ini',
      'Konfirmasi pembayaran dan masukkan PIN',
    ],
  },
  dana: {
    label: 'DANA',
    icon: '💳',
    steps: [
      'Klik tombol <strong>Bayar dengan DANA</strong> di atas',
      'Login ke akun DANA kamu',
      'Konfirmasi pembayaran',
      'Selesai, top up akan diproses otomatis',
    ],
  },
  ovo: {
    label: 'OVO',
    icon: '💜',
    steps: [
      'Klik tombol <strong>Bayar dengan OVO</strong> di atas',
      'Notifikasi akan muncul di aplikasi OVO kamu',
      'Buka OVO dan konfirmasi pembayaran',
      'Selesai, top up akan diproses otomatis',
    ],
  },
  gopay: {
    label: 'GoPay',
    icon: '💚',
    steps: [
      'Klik tombol <strong>Bayar dengan GoPay</strong> di atas',
      'Kamu akan diarahkan ke halaman pembayaran GoPay',
      'Selesaikan pembayaran di aplikasi Gojek',
      'Kembali ke halaman ini setelah pembayaran berhasil',
    ],
  },
  shopeepay: {
    label: 'ShopeePay',
    icon: '🧡',
    steps: [
      'Klik tombol <strong>Bayar dengan ShopeePay</strong> di atas',
      'Kamu akan diarahkan ke halaman pembayaran ShopeePay',
      'Selesaikan pembayaran di aplikasi Shopee',
      'Kembali ke halaman ini setelah pembayaran berhasil',
    ],
  },
  qris: {
    label: 'QRIS',
    icon: '📱',
    steps: [
      'Scan QR code yang ditampilkan menggunakan aplikasi e-wallet / m-banking apapun',
      'Pastikan nominal sesuai',
      'Konfirmasi pembayaran',
      'Top up akan diproses setelah pembayaran dikonfirmasi',
    ],
  },
};

let order = null;
let countdownInterval = null;

async function loadOrder() {
  const params  = new URLSearchParams(window.location.search);
  const orderId = params.get('order_id');
  if (!orderId) { showError(); return; }

  try {
    const res  = await fetch(`/api/orders/${orderId}`);
    const data = await res.json();
    if (!data.success) { showError(); return; }
    order = data.order;
    renderOrder();
  } catch (e) {
    showError();
  }
}

function renderOrder() {
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  const o  = order;
  const pm = o.payment_method;
  const info = PAYMENT_INSTRUCTIONS[pm] || { label: pm, icon: '💳', steps: [] };

  // Status banner
  const banner = document.getElementById('status-banner');
  const icon   = document.getElementById('status-icon');
  const title  = document.getElementById('status-title');
  const sub    = document.getElementById('status-sub');

  if (o.topup_status === 'success') {
    banner.className = 'status-banner success';
    icon.textContent = '✅';
    title.textContent = 'Top Up Berhasil!';
    sub.textContent = `Diamonds/item sudah masuk ke akun kamu. Order: ${o.order_id}`;
    document.getElementById('timer-box').classList.add('hidden');
  } else if (o.payment_status === 'paid' || o.topup_status === 'processing') {
    banner.className = 'status-banner paid';
    icon.textContent = '⚙️';
    title.textContent = 'Pembayaran Diterima — Memproses Top Up';
    sub.textContent = 'Harap tunggu, proses top up sedang berjalan...';
    document.getElementById('timer-box').classList.add('hidden');
  } else if (o.payment_status === 'expired') {
    banner.className = 'status-banner expired';
    icon.textContent = '❌';
    title.textContent = 'Pembayaran Kadaluarsa';
    sub.textContent = 'Silakan buat pesanan baru.';
    document.getElementById('timer-box').classList.add('hidden');
  } else if (o.topup_status === 'failed') {
    banner.className = 'status-banner failed';
    icon.textContent = '⚠️';
    title.textContent = 'Top Up Gagal';
    sub.textContent = 'Hubungi CS kami untuk bantuan. Order ID: ' + o.order_id;
    document.getElementById('timer-box').classList.add('hidden');
  } else {
    // unpaid
    startCountdown(o.expired_at);
  }

  // Detail rows
  document.getElementById('d-order-id').textContent  = o.order_id;
  document.getElementById('d-game').textContent       = `${o.game_icon || ''} ${o.game_name}`;
  document.getElementById('d-package').textContent    = o.package_name;
  document.getElementById('d-account').textContent   = o.customer_no + (o.customer_name ? ` (${o.customer_name})` : '');
  document.getElementById('d-total').textContent      = fmt(o.total_amount);

  // Payment content
  const payCard  = document.getElementById('payment-card');
  const payTitle = document.getElementById('payment-card-title');
  const payBody  = document.getElementById('payment-content');

  if (o.topup_status === 'success') {
    payTitle.textContent = 'Konfirmasi Sukses';
    payBody.innerHTML = `<div style="text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:10px">🎉</div>
      <div style="font-size:15px;font-weight:600;color:var(--green)">Top Up Berhasil!</div>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">Item sudah masuk ke akun game kamu.</div>
      ${o.sn ? `<div style="margin-top:14px;font-size:12px;color:var(--text3)">SN: <code>${o.sn}</code></div>` : ''}
    </div>`;
    return;
  }

  payTitle.textContent = `${info.icon} ${info.label}`;

  let html = '';

  // VA number
  if (o.va_number) {
    html += `<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Nomor Virtual Account</div>
    <div class="va-box">
      <div class="va-number" id="va-num">${formatVA(o.va_number)}</div>
      <button class="copy-btn" onclick="copyVA()">Salin</button>
    </div>`;
  }

  // Payment URL button (ewallet)
  if (o.payment_url && !o.va_number) {
    html += `<a href="${o.payment_url}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;height:46px;background:var(--accent);color:#fff;border-radius:var(--radius-sm);text-decoration:none;font-size:15px;font-weight:600;margin-bottom:14px">
      Bayar dengan ${info.label} →
    </a>`;
  }

  // Instructions
  if (info.steps.length) {
    html += `<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Cara Pembayaran</div>
    <ul class="instruct-list">${info.steps.map(s => `<li>${s}</li>`).join('')}</ul>`;
  }

  payBody.innerHTML = html;
}

function formatVA(va) {
  return va.replace(/(.{4})/g, '$1 ').trim();
}

function copyVA() {
  const va  = order?.va_number;
  if (!va) return;
  navigator.clipboard.writeText(va).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Tersalin';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Salin'; btn.classList.remove('copied'); }, 2000);
  });
}

function startCountdown(expiredAt) {
  if (!expiredAt) { document.getElementById('timer-box').classList.add('hidden'); return; }
  const end = new Date(expiredAt).getTime();

  function tick() {
    const now  = Date.now();
    const diff = Math.max(0, end - now);
    const mm   = Math.floor(diff / 60000);
    const ss   = Math.floor((diff % 60000) / 1000);
    const str  = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    document.getElementById('countdown').textContent = str;

    const timerBox = document.getElementById('timer-box');
    if (diff < 300000) timerBox.classList.add('urgent');
    if (diff === 0) {
      clearInterval(countdownInterval);
      timerBox.innerHTML = '⏰ Waktu pembayaran telah habis. Silakan buat pesanan baru.';
    }
  }

  tick();
  countdownInterval = setInterval(tick, 1000);
}

async function checkStatus() {
  const btn    = document.getElementById('btn-check');
  const text   = document.getElementById('check-text');
  const spin   = document.getElementById('check-spinner');
  btn.disabled = true;
  text.textContent = 'Memeriksa...';
  spin.classList.remove('hidden');

  try {
    const res  = await fetch(`/api/orders/${order.order_id}`);
    const data = await res.json();
    if (data.success) {
      order = data.order;
      if (countdownInterval) clearInterval(countdownInterval);
      renderOrder();
    }
  } catch (e) {}

  btn.disabled = false;
  text.textContent = 'Cek Status Pembayaran';
  spin.classList.add('hidden');
}

function showError() {
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('error-state').classList.remove('hidden');
}

loadOrder();

// Auto refresh setiap 30 detik kalau masih unpaid
setInterval(() => {
  if (order && order.payment_status === 'unpaid') checkStatus();
}, 30000);
</script>
</body>
</html>
