<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order — TopUp Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#6c5ce7;--accent2:#a29bfe;--bg:#f4f4f8;--surface:#fff;--border:#e4e4ee;--text:#0d0d1a;--text2:#4a4a6a;--text3:#9090b0;--green:#00c47a;--red:#ff4757;--orange:#ff6b35}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text)}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.nav-in{max-width:960px;margin:0 auto;display:flex;align-items:center;height:52px;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;text-decoration:none;border:none;background:none;font-family:inherit}
.back-btn:hover{color:var(--accent)}
.nav-game{font-size:14px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.container{max-width:960px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 340px;gap:20px}
@media(max-width:700px){.container{grid-template-columns:1fr;padding:14px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.card-title{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* Game header */
.game-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.game-icon{width:60px;height:60px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.game-icon img{width:100%;height:100%;object-fit:cover}
.game-title{font-size:18px;font-weight:800}
.game-sub{font-size:13px;color:var(--text3);margin-top:2px}
/* Input */
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none;color:var(--text);background:var(--bg);transition:.15s}
.inp:focus{border-color:var(--accent);background:var(--surface)}
.inp-row{display:flex;gap:8px}
.nick-wrap{display:flex;gap:8px;align-items:flex-start}
.nick-btn{padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;font-size:13px;transition:.15s}
.nick-btn:hover{background:#5a4dd6}
.nick-btn:disabled{background:var(--border);color:var(--text3);cursor:default}
.nick-result{margin-top:6px;font-size:12px;padding:6px 10px;border-radius:8px}
.nick-result.ok{background:rgba(0,196,122,.1);color:var(--green)}
.nick-result.err{background:rgba(255,71,87,.1);color:var(--red)}
/* Package */
.pkg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(max-width:400px){.pkg-grid{grid-template-columns:1fr}}
.pkg-card{border:1.5px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:.15s;background:var(--bg)}
.pkg-card:hover{border-color:var(--accent)}
.pkg-card.sel{border-color:var(--accent);background:rgba(108,92,231,.06)}
.pkg-name{font-size:12px;font-weight:700;margin-bottom:4px}
.pkg-price{font-size:14px;font-weight:800;color:var(--accent)}
.pkg-flash{font-size:10px;color:var(--orange);font-weight:700}
/* Payment */
.pay-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pay-card{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s;background:var(--bg);display:flex;align-items:center;gap:8px}
.pay-card:hover{border-color:var(--accent)}
.pay-card.sel{border-color:var(--accent);background:rgba(108,92,231,.06)}
.pay-icon{font-size:18px}
.pay-info{flex:1;min-width:0}
.pay-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-fee{font-size:11px;color:var(--text3)}
/* Summary */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.sum-row:last-of-type{border-bottom:none}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:4px;border-top:2px solid var(--border);font-weight:800;font-size:16px}
.sum-total span:last-child{color:var(--accent)}
.order-btn{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:14px;transition:.15s}
.order-btn:hover{background:#5a4dd6}
.order-btn:disabled{background:var(--border);color:var(--text3);cursor:default}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px 20px;animation:up .25s ease}
@media(min-width:600px){.overlay{align-items:center;padding:20px}.modal{border-radius:20px;max-height:90vh}}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.mtitle{font-size:16px;font-weight:800;margin-bottom:16px;text-align:center}
.micon{width:60px;height:60px;background:rgba(0,196,122,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.conf-rows{margin:16px 0}
.conf-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.conf-row:last-child{border-bottom:none}
.conf-row strong{text-align:right;max-width:60%}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;border:1.5px solid var(--border);background:transparent;color:var(--text2)}
.modal-btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Pay info */
.pay-info-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;text-align:center}
.pay-amount{font-size:24px;font-weight:800;color:var(--accent);margin:8px 0}
.pay-code-box{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:16px;font-weight:700;letter-spacing:1px;text-align:center;cursor:pointer;margin:8px 0}
.pay-qr img{max-width:200px;margin:10px auto;display:block;border-radius:8px}
.copy-hint{font-size:11px;color:var(--text3);margin-top:4px}
.countdown{font-size:13px;color:var(--red);font-weight:600;margin-top:8px}
.shimmer{background:linear-gradient(90deg,var(--bg) 25%,#eaeaf0 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px;height:44px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

[data-theme="dark"]{--bg:#0f0f1a;--surface:#1a1a2e;--border:#2a2a3e;--text:#e8e8f0;--text2:#9090b0;--text3:#5a5a7a;--accent-bg:rgba(108,92,231,.15)}
[data-theme="dark"] nav,[data-theme="dark"] .card,[data-theme="dark"] .order-card,[data-theme="dark"] .page{background:var(--surface)}
[data-theme="dark"] body{background:var(--bg)}

</style>
<style>
[data-theme="light"]{--bg:#f4f4f8;--surface:#fff;--border:#e4e4ee;--text:#0d0d1a;--text2:#4a4a6a;--text3:#9090b0;--accent:#6c5ce7;--accent2:#a29bfe;--accent-bg:#f0eeff}
[data-theme="dark"]{--bg:#0f0f1a;--surface:#1a1a2e;--border:#2a2a3e;--text:#f0f0ff;--text2:#a0a0c0;--text3:#6060a0;--accent:#7c6df0;--accent2:#a29bfe;--accent-bg:rgba(108,92,231,.15)}

[data-theme="dark"]{--bg:#0f0f1a;--surface:#1a1a2e;--border:#2a2a3e;--text:#e8e8f0;--text2:#9090b0;--text3:#5a5a7a;--accent-bg:rgba(108,92,231,.15)}
[data-theme="dark"] nav,[data-theme="dark"] .card,[data-theme="dark"] .order-card,[data-theme="dark"] .page{background:var(--surface)}
[data-theme="dark"] body{background:var(--bg)}

</style>
<script src="/theme.js"></script>
<script>(function(){const s=localStorage.getItem('theme')||'light';if(s==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
<nav>
  <div class="nav-in">
    <a href="/" class="back-btn">← Kembali</a>
    <div class="nav-game" id="nav-game">Memuat...</div>
  <button class="btn" id="theme-toggle" onclick="toggleTheme()" style="margin-left:auto;padding:6px 10px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:transparent;cursor:pointer" title="Ganti tema">☀️</button>
  </div>
</nav>

<div class="container">
  <div id="left-col">
    <div class="card">
      <div class="game-header" id="game-header">
        <div class="shimmer" style="width:60px;height:60px;border-radius:14px;flex-shrink:0"></div>
        <div style="flex:1"><div class="shimmer" style="width:120px;margin-bottom:8px"></div><div class="shimmer" style="width:80px;height:12px"></div></div>
      </div>

      <!-- User ID -->
      <div id="field-wrap"></div>

      <!-- Nick check -->
      <div class="field" id="nick-field" style="display:none">
        <div id="nick-result"></div>
      </div>

      <!-- Packages -->
      <div class="card-title" style="margin-top:8px">💎 Pilih Nominal</div>
      <div class="pkg-grid" id="pkg-grid">
        <div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-title">💳 Metode Pembayaran</div>
      <div class="pay-grid" id="pay-grid">
        <div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div><div class="shimmer"></div>
      </div>
    </div>

    <!-- Customer info -->
    <div class="card" style="margin-top:16px">
      <div class="card-title">👤 Data Pemesan <span style="font-size:12px;color:var(--text3);font-weight:500">(opsional)</span></div>
      <div class="field">
        <label>Nama</label>
        <input class="inp" type="text" id="cust-name" placeholder="Nama kamu">
      </div>
      <div class="field">
        <label>WhatsApp</label>
        <input class="inp" type="tel" id="cust-wa" placeholder="08xxxx (untuk notifikasi)">
      </div>
    </div>
  </div>

  <!-- Right: Summary -->
  <div id="right-col">
    <div class="card" style="position:sticky;top:68px">
      <div class="card-title">📋 Ringkasan</div>
      <div id="summary-rows">
        <div class="sum-row"><span>Game</span><span id="s-game" style="color:var(--text3)">—</span></div>
        <div class="sum-row"><span>Item</span><span id="s-item" style="color:var(--text3)">—</span></div>
        <div class="sum-row"><span>ID</span><span id="s-id" style="color:var(--text3)">—</span></div>
        <div class="sum-row"><span>Metode</span><span id="s-pay" style="color:var(--text3)">—</span></div>
        <div class="sum-row"><span>Harga</span><span id="s-price" style="color:var(--text3)">—</span></div>
      </div>
      <div class="sum-total"><span>Total</span><span id="s-total">—</span></div>
      <button class="order-btn" id="order-btn" onclick="openConfirm()" disabled>Pilih Produk & Pembayaran</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="overlay" id="modal-confirm" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="micon">✅</div>
    <div class="mtitle">Konfirmasi Pesanan</div>
    <div class="conf-rows" id="conf-rows"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="document.getElementById('modal-confirm').classList.remove('open')">Batal</button>
      <button class="modal-btn pri" id="pay-btn" onclick="submitOrder()">Bayar Sekarang!</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="overlay" id="modal-pay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="pay-modal-title">Selesaikan Pembayaran</div>
    <div id="pay-modal-content"></div>
    <button class="modal-btn" style="width:100%;margin-top:12px" onclick="location.href='/cek-order?id='+currentOrderId">Cek Status Order</button>
  </div>
</div>

<script>
const fmt=n=>'Rp '+Math.round(n||0).toLocaleString('id-ID');
const params=new URLSearchParams(location.search);
const GAME_CODE=params.get('game')||'';
let GAME=null,PACKAGES=[],SEL_PKG=null,SEL_PAY=null,NICK='',NICK_OK=false,currentOrderId='';

const PAY_ICONS={'qris':'🔲','bca_va':'🏦','bni_va':'🏦','bri_va':'🏦','mandiri_va':'🏦','ovo':'💜','gopay':'💚','dana':'💙','shopeepay':'🧡','indomaret':'🏪','alfamart':'🏪'};

async function init(){
  if(!GAME_CODE){location.href='/';return;}
  try{
    const d=await fetch(`/api/games/${GAME_CODE}`).then(r=>r.json());
    if(!d.success){location.href='/';return;}
    GAME=d.game;PACKAGES=d.packages||[];
    renderGame();renderPackages();
  }catch(e){location.href='/';}
  loadPayments();
}

function renderGame(){
  document.title=GAME.name+' — TopUp Game';
  document.getElementById('nav-game').textContent=GAME.name;
  const fields=GAME.fields?JSON.parse(GAME.fields):[];
  document.getElementById('game-header').innerHTML=`
    <div class="game-icon">${GAME.icon_url?`<img src="${GAME.icon_url}">`:''}${GAME.icon||'🎮'}</div>
    <div><div class="game-title">${GAME.name}</div><div class="game-sub">${GAME.instructions||'Masukkan ID akun game kamu'}</div></div>`;
  
  // Build input fields
  const defaultFields=[{id:'user_id',label:'User ID',placeholder:'Masukkan User ID',type:'text'}];
  const gameFields=fields.length?fields:defaultFields;
  if(GAME.category==='game'&&!fields.length){
    gameFields.push({id:'zone_id',label:'Zone ID / Server',placeholder:'Masukkan Zone ID (jika ada)',type:'text',optional:true});
  }
  document.getElementById('field-wrap').innerHTML=gameFields.map(f=>`
    <div class="field">
      <label>${f.label}${f.optional?' <span style="font-weight:400;color:var(--text3)">(opsional)</span>':''}</label>
      <div class="nick-wrap">
        <input class="inp" type="${f.type||'text'}" id="field-${f.id}" placeholder="${f.placeholder||''}" oninput="onFieldInput()">
        ${f.id==='user_id'?`<button class="nick-btn" id="nick-btn" onclick="checkNick()" disabled>Cek</button>`:''}
      </div>
    </div>`).join('');
}

function onFieldInput(){
  const uid=document.getElementById('field-user_id')?.value?.trim();
  const btn=document.getElementById('nick-btn');
  if(btn)btn.disabled=!uid;
  NICK_OK=false;NICK='';
  const nr=document.getElementById('nick-result');
  if(nr){nr.innerHTML='';nr.dataset.nick='';}
  updateBtn();updateSummary();
}

async function checkNick(){
  const uid=document.getElementById('field-user_id')?.value?.trim();
  const zid=document.getElementById('field-zone_id')?.value?.trim()||'';
  if(!uid)return;
  const btn=document.getElementById('nick-btn');
  btn.textContent='...';btn.disabled=true;
  try{
    const d=await fetch(`/api/check-nickname?game=${GAME_CODE}&userId=${uid}${zid?'&zoneId='+zid:''}`).then(r=>r.json());
    const nr=document.getElementById('nick-result');
    document.getElementById('nick-field').style.display='';
    if(d.success&&d.nickname){NICK=d.nickname;NICK_OK=true;nr.dataset.nick=d.nickname;nr.innerHTML=`<div class="nick-result ok">✅ ${d.nickname}</div>`;}
    else{NICK='';NICK_OK=false;nr.dataset.nick='';nr.innerHTML=`<div class="nick-result err">❌ ${d.message||'ID tidak ditemukan'}</div>`;}
  }catch(e){NICK_OK=false;}
  btn.textContent='Cek';btn.disabled=false;
  updateBtn();updateSummary();
}

function renderPackages(){
  const grid=document.getElementById('pkg-grid');
  if(!PACKAGES.length){grid.innerHTML='<div style="grid-column:1/-1;color:var(--text3);text-align:center;padding:20px">Belum ada paket</div>';return;}
  grid.innerHTML=PACKAGES.map(p=>`
    <div class="pkg-card" id="pkg-${p.id}" onclick="selectPkg(${p.id})">
      <div class="pkg-name">${p.name}</div>
      <div class="pkg-price">${fmt(p.sell_price)}</div>
      ${p.is_flash?'<div class="pkg-flash">⚡ Flash Sale</div>':''}
    </div>`).join('');
}

function selectPkg(id){
  SEL_PKG=PACKAGES.find(p=>p.id===id);
  document.querySelectorAll('.pkg-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('pkg-'+id)?.classList.add('sel');
  updateBtn();updateSummary();
}

async function loadPayments(){
  const grid=document.getElementById('pay-grid');
  const methods=[
    {code:'qris',name:'QRIS',fee:'Gratis'},
    {code:'bca_va',name:'BCA Virtual Account',fee:'Gratis'},
    {code:'bni_va',name:'BNI Virtual Account',fee:'Gratis'},
    {code:'bri_va',name:'BRI Virtual Account',fee:'Gratis'},
    {code:'mandiri_va',name:'Mandiri VA',fee:'Gratis'},
    {code:'gopay',name:'GoPay',fee:'Gratis'},
    {code:'ovo',name:'OVO',fee:'Gratis'},
    {code:'dana',name:'DANA',fee:'Gratis'},
    {code:'shopeepay',name:'ShopeePay',fee:'Gratis'},
    {code:'indomaret',name:'Indomaret',fee:'Gratis'},
  ];
  grid.innerHTML=methods.map(m=>`
    <div class="pay-card" id="pay-${m.code}" onclick="selectPay('${m.code}','${m.name}')">
      <div class="pay-icon">${PAY_ICONS[m.code]||'💳'}</div>
      <div class="pay-info"><div class="pay-name">${m.name}</div><div class="pay-fee">${m.fee}</div></div>
    </div>`).join('');
}

function selectPay(code,name){
  SEL_PAY={code,name};
  document.querySelectorAll('.pay-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('pay-'+code)?.classList.add('sel');
  updateBtn();updateSummary();
}

function updateBtn(){
  const uid=document.getElementById('field-user_id')?.value?.trim();
  const btn=document.getElementById('order-btn');
  const ready=uid&&SEL_PKG&&SEL_PAY;
  btn.disabled=!ready;
  btn.textContent=ready?'Pesan Sekarang! →':'Pilih Produk & Pembayaran';
}

function updateSummary(){
  const uid=document.getElementById('field-user_id')?.value?.trim()||'—';
  const zid=document.getElementById('field-zone_id')?.value?.trim()||'';
  document.getElementById('s-game').textContent=GAME?.name||'—';
  document.getElementById('s-item').textContent=SEL_PKG?.name||'—';
  document.getElementById('s-id').textContent=uid+(zid?' / '+zid:'');
  document.getElementById('s-pay').textContent=SEL_PAY?.name||'—';
  document.getElementById('s-price').textContent=SEL_PKG?fmt(SEL_PKG.sell_price):'—';
  document.getElementById('s-total').textContent=SEL_PKG?fmt(SEL_PKG.sell_price):'—';
}

function openConfirm(){
  const uid=document.getElementById('field-user_id')?.value?.trim();
  const zid=document.getElementById('field-zone_id')?.value?.trim()||'';
  const nick=document.getElementById('nick-result')?.dataset?.nick||'';
  document.getElementById('conf-rows').innerHTML=`
    <div class="conf-row"><span>Username</span><strong>${nick||'—'}</strong></div>
    <div class="conf-row"><span>ID</span><strong>${uid}${zid?' / '+zid:''}</strong></div>
    <div class="conf-row"><span>Game</span><strong>${GAME.name}</strong></div>
    <div class="conf-row"><span>Item</span><strong>${SEL_PKG.name}</strong></div>
    <div class="conf-row"><span>Metode</span><strong>${SEL_PAY.name}</strong></div>
    <div class="conf-row"><span style="font-weight:800">Total</span><strong style="color:var(--accent);font-size:16px">${fmt(SEL_PKG.sell_price)}</strong></div>`;
  document.getElementById('modal-confirm').classList.add('open');
}

async function submitOrder(){
  const btn=document.getElementById('pay-btn');
  btn.disabled=true;btn.textContent='Memproses...';
  try{
    const uid=document.getElementById('field-user_id')?.value?.trim();
    const zid=document.getElementById('field-zone_id')?.value?.trim()||'';
    const d=await fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      game_code:GAME_CODE,package_id:SEL_PKG.id,customer_no:uid,zone_id:zid,
      customer_name:document.getElementById('cust-name').value,
      customer_wa:document.getElementById('cust-wa').value,
      payment_method:SEL_PAY.code
    })}).then(r=>r.json());
    document.getElementById('modal-confirm').classList.remove('open');
    if(d.success){
      currentOrderId=d.order_id;
      showPayment(d);
    }else{alert('Gagal: '+d.message);}
  }catch(e){alert('Terjadi kesalahan');}
  btn.disabled=false;btn.textContent='Bayar Sekarang!';
}

function showPayment(d){
  document.getElementById('pay-modal-title').textContent='Selesaikan Pembayaran';
  let html=`<div class="pay-info-box">
    <div style="font-size:12px;color:var(--text3)">Total Pembayaran</div>
    <div class="pay-amount">${fmt(d.total)}</div>
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">Order ID: <strong>${d.order_id}</strong></div>`;
  if(d.pay_qr)html+=`<div class="pay-qr"><img src="${d.pay_qr}" onerror="this.style.display='none'"></div>`;
  if(d.pay_code)html+=`<div class="pay-code-box" onclick="copy('${d.pay_code}')">${d.pay_code}</div><div class="copy-hint">Tap untuk salin</div>`;
  if(d.pay_url)html+=`<a href="${d.pay_url}" target="_blank" style="display:block;margin-top:10px;padding:12px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px">Bayar via Link →</a>`;
  html+=`<div class="countdown" id="countdown"></div></div>`;
  document.getElementById('pay-modal-content').innerHTML=html;
  document.getElementById('modal-pay').classList.add('open');
  if(d.expired_at){
    const exp=new Date(d.expired_at);
    const t=setInterval(()=>{
      const s=Math.max(0,Math.floor((exp-Date.now())/1000));
      const m=Math.floor(s/60),ss=s%60;
      document.getElementById('countdown').textContent=`⏳ Bayar dalam ${m}:${String(ss).padStart(2,'0')}`;
      if(s<=0)clearInterval(t);
    },1000);
  }
}
function copy(t){navigator.clipboard.writeText(t).then(()=>{const d=document.createElement('div');d.textContent='Disalin!';d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0d0d1a;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;font-family:sans-serif';document.body.appendChild(d);setTimeout(()=>d.remove(),1800)});}

init();
</script>
</body>
</html>
